<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5ecd6">
<title>Har &amp; Lily — Living Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #faf6ef;
  --paper-warm: #f5ecd6;
  --paper-deep: #ebe1bc;
  --ink: #2d2620;
  --ink-soft: #6b5e4c;
  --rule: #c8b88f;
  --rule-soft: #e0d4ad;
  --accent: #8b3a3a;
  --positive: #2d7a2d;
  --positive-soft: rgba(180, 215, 145, 0.25);
  --negative: #b03030;
  --negative-soft: rgba(220, 130, 130, 0.18);
  --warn: #b08020;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
input, button, select, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; }

/* ===== Sign-in gate ===== */
.signin-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #f5ecd6 0%, #e8dcb8 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.signin-gate.hidden { display: none; }
.signin-card {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 4px;
  padding: 36px 28px;
  max-width: 380px; width: 100%;
  box-shadow: 0 8px 32px rgba(60, 50, 30, 0.2);
}
.signin-brand { text-align: center; margin-bottom: 24px; }
.signin-brand h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 600; margin: 0;
  letter-spacing: 0.02em;
}
.signin-brand h1 em { font-style: italic; color: var(--ink-soft); font-weight: 500; }
.signin-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-style: italic;
  color: var(--ink-soft); margin-top: 4px;
}
.signin-card form { display: flex; flex-direction: column; gap: 10px; }
.signin-card label {
  font-family: 'Inter', sans-serif; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-soft); font-weight: 600;
}
.signin-card input[type=email],
.signin-card input[type=password] {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  padding: 12px 14px;
  background: var(--paper-warm);
  border: 1.5px solid var(--rule-soft);
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  width: 100%;
  transition: border-color 0.15s ease;
}
.signin-card input:focus {
  border-color: var(--ink);
  background: var(--paper);
}
.signin-btn {
  margin-top: 10px;
  padding: 13px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.signin-btn:disabled { opacity: 0.5; }
.signin-error {
  min-height: 18px;
  font-size: 12px;
  color: var(--negative);
  text-align: center;
  font-style: italic;
  margin-top: 4px;
}

/* ===== Masthead ===== */
.masthead {
  border-bottom: 2px solid var(--ink);
  padding: 16px 18px 12px;
  background: var(--paper);
  position: sticky; top: 0; z-index: 50;
}
.masthead-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; max-width: 900px; margin: 0 auto;
  flex-wrap: wrap;
}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.brand em { font-style: italic; color: var(--ink-soft); font-weight: 500; }
.tools { display: flex; align-items: center; gap: 8px; }
.sync-pill {
  display: inline-flex; align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 12px;
  border: 1px solid var(--rule-soft);
  background: var(--paper-warm);
  color: var(--ink-soft);
}
.sync-synced { color: var(--positive); border-color: rgba(120, 168, 104, 0.5); background: var(--positive-soft); }
.sync-syncing { color: var(--warn); border-color: rgba(184, 168, 104, 0.5); }
.sync-offline { color: var(--negative); border-color: rgba(180, 100, 100, 0.5); background: var(--negative-soft); }
.btn-icon {
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 2px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--ink-soft);
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}
.btn-icon:hover { background: var(--paper-warm); color: var(--ink); }

/* ===== Tabs ===== */
.tabs {
  border-bottom: 1px solid var(--rule-soft);
  background: var(--paper);
  position: sticky; top: 60px; z-index: 40;
}
.tabs-inner {
  display: flex; max-width: 900px; margin: 0 auto;
}
.tab {
  flex: 1;
  padding: 14px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
  font-weight: 500;
  color: var(--ink-soft);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  transition: all 0.15s ease;
  cursor: pointer;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.tab:hover:not(.active) { color: var(--ink); background: var(--paper-warm); }

/* ===== Layout ===== */
main { max-width: 900px; margin: 0 auto; padding: 16px 14px 80px; }
.section { margin-bottom: 24px; }
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 24px;
  margin: 0 0 4px;
  letter-spacing: 0.01em;
}
h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 19px;
  margin: 0 0 10px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
h3 .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
}
.desc {
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;
  margin-bottom: 12px;
}

/* ===== Cards ===== */
.card {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 14px;
}
.card.accent {
  background: linear-gradient(160deg, var(--paper) 0%, var(--paper-warm) 100%);
  border: 1.5px solid var(--ink);
}

/* ===== Today card (top-of-tab quick-add) ===== */
.today-card {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 4px;
  padding: 18px 16px;
  margin-bottom: 18px;
  box-shadow: 0 2px 8px rgba(60, 50, 30, 0.06);
}
.today-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px; margin-bottom: 14px;
}
.today-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  line-height: 1.1;
}
.today-date em {
  font-style: italic;
  color: var(--ink-soft);
  font-weight: 500;
  font-size: 18px;
  display: block;
  margin-top: 2px;
}
.today-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: var(--ink);
  text-align: right;
}
.today-amount.spent { color: var(--accent); }
.today-amount.empty { color: var(--ink-soft); opacity: 0.5; }

.today-input-row {
  display: flex; gap: 8px; align-items: stretch;
}
.today-input {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  padding: 14px 16px;
  background: var(--paper-warm);
  border: 1.5px solid var(--rule-soft);
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  text-align: right;
}
.today-input:focus { border-color: var(--ink); background: var(--paper); }
.today-add-btn {
  padding: 0 22px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.today-add-btn:active { transform: translateY(1px); }
.today-add-btn:disabled { opacity: 0.5; }

.today-week-summary {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule-soft);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.today-week-summary > div {
  text-align: center;
  padding: 6px 4px;
}
.today-week-summary .label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 4px;
}
.today-week-summary .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
}
.today-week-summary .sub {
  font-size: 10px;
  color: var(--ink-soft);
  font-style: italic;
  margin-top: 2px;
}

.progress-bar {
  height: 6px;
  background: var(--rule-soft);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-fill { height: 100%; transition: width 0.3s ease; }
.progress-fill.good { background: linear-gradient(90deg, #80a868, #b8d8a4); }
.progress-fill.warn { background: linear-gradient(90deg, #c8a050, #e0c878); }
.progress-fill.over { background: linear-gradient(90deg, #b03030, #d86060); }

/* ===== Stats row ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.stat {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 3px;
  padding: 10px 12px;
  text-align: center;
}
.stat .label {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 4px;
}
.stat .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.1;
}
.stat .value.pos { color: var(--positive); }
.stat .value.neg { color: var(--negative); }
.stat .sub {
  font-size: 10px;
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 2px;
}

/* ===== Month picker chips ===== */
.month-picker {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 8px;
  margin-bottom: 12px;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
}
.month-picker::-webkit-scrollbar { height: 4px; }
.month-picker::-webkit-scrollbar-thumb { background: var(--rule-soft); border-radius: 2px; }
.month-chip {
  flex-shrink: 0;
  scroll-snap-align: start;
  padding: 8px 14px;
  border: 1px solid var(--rule-soft);
  background: var(--paper);
  border-radius: 18px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s ease;
}
.month-chip.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 600;
}
.month-chip:active { transform: scale(0.97); }

/* ===== Chart container ===== */
.chart-container {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 16px;
}
.chart-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.chart-tab {
  flex: 1;
  padding: 6px 8px;
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 3px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
}
.chart-tab.active {
  background: var(--paper-warm);
  color: var(--ink);
  border-color: var(--ink);
  font-weight: 600;
}
.chart-canvas-wrap {
  position: relative;
  height: 180px;
  width: 100%;
}

/* ===== Week display ===== */
.week-block {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 3px;
  margin-bottom: 12px;
  overflow: hidden;
}
.week-header {
  background: var(--paper-warm);
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule-soft);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.week-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
}
.week-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
}
.week-meta .goal-progress {
  font-size: 10px;
  color: var(--ink-soft);
  font-weight: 500;
  margin-top: 1px;
}

.day-rows { padding: 4px 0; }
.day-row {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  gap: 10px;
  border-bottom: 1px solid var(--rule-soft);
}
.day-row:last-child { border-bottom: none; }
.day-row.blocked {
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 6px,
    rgba(200, 184, 143, 0.18) 6px,
    rgba(200, 184, 143, 0.18) 12px
  );
  opacity: 0.55;
}
.day-row.today {
  background: var(--positive-soft);
  border-left: 3px solid var(--positive);
}
.day-row.today .day-label { color: var(--positive); font-weight: 700; }
.day-row.over-goal {
  background: rgba(220, 130, 130, 0.08);
}
.day-label {
  flex: 0 0 90px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  font-weight: 600;
}
.day-label .date-num {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-top: 1px;
  text-transform: none;
  letter-spacing: 0;
}
.day-row.blocked .day-label,
.day-row.blocked .day-label .date-num { color: var(--ink-soft); }
.day-input {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  padding: 10px 12px;
  background: var(--paper-warm);
  border: 1.5px solid transparent;
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  text-align: right;
  min-width: 0;
}
.day-input:focus {
  border-color: var(--ink);
  background: var(--paper);
}
.day-input.blocked-input { display: none; }
.day-row.blocked .blocked-marker {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-style: italic;
  color: var(--ink-soft);
  text-align: right;
}
.day-row.over-goal .day-input {
  background: rgba(220, 130, 130, 0.12);
  color: var(--negative);
  font-weight: 600;
}

.week-footer {
  background: var(--paper-deep);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  border-top: 1px solid var(--rule);
}
.week-footer .total-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  font-weight: 600;
}
.week-footer .remaining {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
}
.week-footer .remaining.over { color: var(--negative); font-weight: 700; }

/* ===== Fixed costs panel ===== */
.fixed-panel {
  margin-top: 18px;
}
.fixed-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
}
.fixed-row:last-child { border-bottom: none; }
.fixed-row .item {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
}
.fixed-row .amt-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  padding: 6px 10px;
  background: var(--paper-warm);
  border: 1px solid transparent;
  border-radius: 2px;
  width: 90px;
  text-align: right;
}
.fixed-row .amt-input:focus { border-color: var(--ink); background: var(--paper); outline: none; }
.fixed-row .delete-btn {
  background: transparent;
  border: none;
  color: var(--ink-soft);
  font-size: 18px;
  padding: 0 6px;
  line-height: 1;
}
.fixed-row .delete-btn:hover { color: var(--negative); }
.fixed-row .note-icon {
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 2px;
  padding: 2px 6px;
  font-size: 11px;
  color: var(--ink-soft);
}
.fixed-row .note-icon.has-note { background: var(--paper-warm); color: var(--ink); }

.fixed-note {
  margin: 0 12px 8px;
  padding: 6px 10px;
  background: var(--paper-warm);
  border-left: 2px solid var(--rule);
  font-size: 12px;
  font-style: italic;
  color: var(--ink-soft);
  white-space: pre-wrap;
}

.add-row-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px dashed var(--rule);
  border-radius: 2px;
  color: var(--ink-soft);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  margin-top: 8px;
}
.add-row-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper-warm); }

/* ===== Modal ===== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(40, 32, 25, 0.5);
  display: none;
  align-items: center; justify-content: center;
  padding: 16px;
  z-index: 200;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 4px;
  padding: 20px;
  max-width: 420px;
  width: 100%;
}
.modal h3 { font-size: 18px; margin-bottom: 14px; display: block; }
.modal .field { margin-bottom: 12px; }
.modal label {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 4px;
}
.modal input, .modal textarea {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  background: var(--paper-warm);
  border: 1.5px solid var(--rule-soft);
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  font-family: inherit;
}
.modal input[type=number] { font-family: 'JetBrains Mono', monospace; }
.modal input:focus, .modal textarea:focus { border-color: var(--ink); background: var(--paper); }
.modal textarea { min-height: 70px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button {
  padding: 9px 18px;
  border-radius: 2px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--ink-soft);
}
.modal-actions .btn-cancel { background: transparent; color: var(--ink-soft); }
.modal-actions .btn-save { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.modal-actions .btn-delete { background: var(--negative); color: var(--paper); border-color: var(--negative); margin-right: auto; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--ink);
  color: var(--paper);
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
  max-width: calc(100vw - 40px);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.error { background: var(--negative); }

/* ===== Mobile-first refinements ===== */
@media (max-width: 480px) {
  .masthead { padding: 12px 12px 10px; }
  .brand { font-size: 18px; }
  .tabs { top: 56px; }
  .tab { font-size: 16px; padding: 12px 8px; }
  main { padding: 12px 12px 80px; }

  setSync('pending', '● Connecting…');
  if (!_currentUser && fb.auth.currentUser) _currentUser = fb.auth.currentUser;
  if (!_currentUser) { setSync('offline', '● Local'); return; }
  _unsubFs = fb.onSnapshot(fb.docRef(), (snap) => {
    if (!snap.exists()) {
      _firestoreReady = true;
      pushToFirestore();
      return;
    }
    const remote = snap.data();
    const remoteAt = remote.client_updated_at || 0;
    if (remoteAt > _lastRemoteAt && remote.data) {
      _lastRemoteAt = remoteAt;
      const elapsed = Date.now() - remoteAt;
      if (elapsed > 800) {
        _suppressNextWrite = true;
        db = remote.data;
        ensureDbDefaults();
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){}
        if (_appBooted) render();
        toast('Synced from another device');
      }
    }
    _firestoreReady = true;
    setSync('synced');
  }, (err) => {
    console.error('Firestore listener:', err);
    setSync('offline');
  });
}

function ensureDbDefaults() {
  if (!db.earnings || typeof db.earnings !== 'object') db.earnings = {};
  if (!db.spending || typeof db.spending !== 'object') db.spending = {};
  if (!Array.isArray(db.fixed_spending)) db.fixed_spending = SEED.fixed_spending.slice();
  if (!db.fixed_overrides || typeof db.fixed_overrides !== 'object') db.fixed_overrides = {};
  if (!db.fixed_notes || typeof db.fixed_notes !== 'object') db.fixed_notes = {};
  if (typeof db.spending_daily_goal !== 'number') db.spending_daily_goal = 60;
}

function loadDB() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      db = JSON.parse(stored);
      ensureDbDefaults();
      // Merge seed entries that don't exist locally (first-load only — preserves user edits)
      for (const k in SEED.earnings) if (!(k in db.earnings)) db.earnings[k] = SEED.earnings[k];
      for (const k in SEED.spending) if (!(k in db.spending)) db.spending[k] = SEED.spending[k];
    } else {
      db = JSON.parse(JSON.stringify(SEED));
      ensureDbDefaults();
    }
  } catch (e) {
    db = JSON.parse(JSON.stringify(SEED));
    ensureDbDefaults();
  }
}

let _saveTimer = null;
function saveDB() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){}
    pushToFirestore();
  }, 250);
}
function saveDBNow() {
  clearTimeout(_saveTimer);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){}
  pushToFirestore();
}

// ============================================================================

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function pad2(n) { return String(n).padStart(2, '0'); }
function dateToISO(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function monthKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function todayISO() { return dateToISO(new Date()); }
function todayMonthKey() { return monthKey(new Date()); }

function parseISO(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmt$(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Number(n);
  return (v < 0 ? '-' : '') + '$' + Math.abs(v).toFixed(2);
}
function fmt$0(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Number(n);
  return (v < 0 ? '-' : '') + '$' + Math.abs(v).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function escHTML(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.className = 'toast', 2200);
}

// ============================================================================
// MONTH / WEEK COMPUTATION
// ============================================================================

// Get all months that have ANY data, plus the current month
function getRelevantMonths() {
  const set = new Set();
  set.add(todayMonthKey());
  for (const k of Object.keys(db.earnings)) set.add(k.slice(0, 7));
  for (const k of Object.keys(db.spending)) set.add(k.slice(0, 7));
  return Array.from(set).sort().reverse();
}

// Get all weeks that overlap a given month — Mon-Sun convention
// Returns: [{ start: Date, dates: [Date×7], label: 'May 5 - 11' }]
function getWeeksForMonth(year, month0) {
  const first = new Date(year, month0, 1);
  const last = new Date(year, month0 + 1, 0);
  // Find Monday on or before first
  const firstDow = first.getDay(); // 0=Sun, 1=Mon, ...
  const startMon = new Date(first);
  const offsetToMon = firstDow === 0 ? -6 : 1 - firstDow;
  startMon.setDate(first.getDate() + offsetToMon);
  const weeks = [];
  let cursor = new Date(startMon);
  while (cursor <= last) {
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(cursor);
      d.setDate(cursor.getDate() + i);
      dates.push(d);
    }
    weeks.push({
      start: dates[0],
      dates,
      label: weekLabel(dates),
    });
    cursor.setDate(cursor.getDate() + 7);
  }
  return weeks;
}

function weekLabel(dates) {
  // 'May 5 - 11' or 'May 26 - June 1'
  const startMon = MONTHS_SHORT[dates[0].getMonth()];
  const endMon = MONTHS_SHORT[dates[6].getMonth()];
  if (startMon === endMon) return `${startMon} ${dates[0].getDate()} – ${dates[6].getDate()}`;
  return `${startMon} ${dates[0].getDate()} – ${endMon} ${dates[6].getDate()}`;
}

function isInMonth(d, year, month0) {
  return d.getFullYear() === year && d.getMonth() === month0;
}

// Sum of values in a date range for a given kind ('earnings' or 'spending')
function sumDateRange(kind, fromISO, toISO) {
  let s = 0;
  for (const k in db[kind]) {
    if (k >= fromISO && k <= toISO) s += Number(db[kind][k]) || 0;
  }
  return s;
}

function sumMonth(kind, year, month0) {
  const from = `${year}-${pad2(month0+1)}-01`;
  const last = new Date(year, month0+1, 0).getDate();
  const to = `${year}-${pad2(month0+1)}-${pad2(last)}`;
  return sumDateRange(kind, from, to);
}

function countDaysWithData(kind, year, month0) {
  const prefix = `${year}-${pad2(month0+1)}-`;
  let c = 0;
  for (const k in db[kind]) {
    if (k.startsWith(prefix) && Number(db[kind][k]) > 0) c++;
  }
  return c;
}

// ============================================================================
// FIXED SPENDING
// ============================================================================
function getFixedForMonth(monthIso) {
  // Returns { items: [{...}], total }
  const items = [...db.fixed_spending];
  if (db.fixed_overrides[monthIso]) {
    for (const x of db.fixed_overrides[monthIso]) items.push(x);
  }
  const total = items.reduce((s,x) => s + (Number(x.amount) || 0), 0);
  return { items, total };
}

  document.getElementById('tabSpending').classList.toggle('active', tab === 'spending');

}

function render() {

  setTimeout(() => renderCharts(currentTab), 0);
}

function renderTab(tab) {
  const isE = tab === 'earnings';
  const tabName = isE ? 'Earnings' : 'Spending';
  const kind = tab;

  // Top: Today card
  const today = new Date();
  const todayIso = dateToISO(today);
  const todayVal = Number(db[kind][todayIso] || 0);

  // This week (containing today, Mon-Sun)
  const dow = today.getDay();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + (dow === 0 ? -6 : 1 - dow));
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  const weekTotal = sumDateRange(kind, dateToISO(weekStart), dateToISO(weekEnd));
  const dailyGoal = db.spending_daily_goal || 60;
  const weekGoal = dailyGoal * 7;
  const weekRemaining = weekGoal - weekTotal;
  let weekProgress = 0;
  let weekProgressClass = 'good';
  if (!isE) {
    weekProgress = Math.min(100, (weekTotal / weekGoal) * 100);
    if (weekTotal > weekGoal) weekProgressClass = 'over';
    else if (weekTotal > weekGoal * 0.8) weekProgressClass = 'warn';
  }

  // Currently viewed month
  const cm = currentMonth || todayMonthKey();
  const [vy, vm] = cm.split('-').map(Number);
  const month0 = vm - 1;
  const monthSum = sumMonth(kind, vy, month0);
  const daysInMonth = new Date(vy, month0 + 1, 0).getDate();
  const today_in_month = (vy === today.getFullYear() && month0 === today.getMonth());
  const daysElapsed = today_in_month ? today.getDate() : daysInMonth;
  const daysWithData = countDaysWithData(kind, vy, month0);
  const dailyAvg = daysWithData > 0 ? monthSum / daysWithData : 0;
  const weeksInMonth = getWeeksForMonth(vy, month0);
  const weeklyAvg = weeksInMonth.length > 0 ? monthSum / weeksInMonth.length : 0;

  // Fixed spending for the viewed month (spending only)
  let fixedHtml = '';
  let fixedTotal = 0;
  if (!isE) {
    const fixed = getFixedForMonth(cm);
    fixedTotal = fixed.total;
    fixedHtml = renderFixedSpending(cm);
  }

  const monthGrandTotal = !isE ? monthSum + fixedTotal : monthSum;

  let html = `
    <!-- Today card -->
    <div class="today-card">
      <div class="today-header">
        <div>
          <div class="today-date">${MONTHS[today.getMonth()]} ${today.getDate()}</div>
          <em>${DAYS_LONG[today.getDay()]}</em>
        </div>
        <div class="today-amount ${todayVal > 0 ? (isE ? '' : 'spent') : 'empty'}">
          ${todayVal > 0 ? fmt$(todayVal) : '—'}
        </div>
      </div>
      <div class="today-input-row">
        <input type="number" inputmode="decimal" step="0.01" id="todayInput" class="today-input"
          placeholder="${isE ? 'Amount earned today' : 'Amount spent today'}"
          onkeydown="if(event.key==='Enter')addTodayAmount('${kind}')">
        <button class="today-add-btn" onclick="addTodayAmount('${kind}')">Add</button>
      </div>
      <div class="today-week-summary">
        <div>
          <div class="label">Week-to-date</div>
          <div class="value ${isE ? 'pos' : ''}">${fmt$0(weekTotal)}</div>
          ${!isE ? `
            <div class="progress-bar"><div class="progress-fill ${weekProgressClass}" style="width: ${weekProgress}%"></div></div>
            <div class="sub">${fmt$0(Math.abs(weekRemaining))} ${weekRemaining >= 0 ? 'left' : 'over'} of ${fmt$0(weekGoal)} goal</div>
          ` : `<div class="sub">${DAYS_SHORT[(weekStart.getDay()+6)%7+1]} – ${DAYS_SHORT[weekEnd.getDay()]}</div>`}
        </div>
        <div>
          <div class="label">Today's ${isE ? 'goal pace' : 'budget'}</div>
          ${isE
            ? `<div class="value">—</div><div class="sub">log as you go</div>`
            : `<div class="value ${todayVal > dailyGoal ? 'neg' : ''}">${fmt$0(dailyGoal - todayVal)}</div>
               <div class="sub">${todayVal > dailyGoal ? `over by ${fmt$0(todayVal - dailyGoal)}` : `left of ${fmt$0(dailyGoal)}`}</div>`}
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <div class="chart-tabs">
        <button class="chart-tab active" id="chartTab12w" onclick="switchChart('12w')">12-week trend</button>
        <button class="chart-tab" id="chartTab6m" onclick="switchChart('6m')">6-month bars</button>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <!-- Month picker chips -->
    <div class="month-picker" id="monthPicker">
      ${renderMonthChips(cm)}
    </div>

    <!-- Month stats -->
    <div class="stats-row">
      <div class="stat">
        <div class="label">${MONTHS[month0]} Total</div>
        <div class="value ${isE ? 'pos' : ''}">${fmt$0(isE ? monthSum : monthGrandTotal)}</div>
        <div class="sub">${isE ? `${daysWithData} days` : `incl. ${fmt$0(fixedTotal)} fixed`}</div>
      </div>
      <div class="stat">
        <div class="label">Daily Avg</div>
        <div class="value">${fmt$0(dailyAvg)}</div>
        <div class="sub">${daysWithData} day${daysWithData !== 1 ? 's' : ''} logged</div>
      </div>
      <div class="stat">
        <div class="label">${isE ? 'Days Logged' : 'Weekly Avg'}</div>
        <div class="value">${isE ? daysWithData : fmt$0(weeklyAvg)}</div>
        <div class="sub">of ${isE ? daysInMonth : weeksInMonth.length + ' weeks'}</div>
      </div>
    </div>

    <!-- Weeks of this month -->
    ${renderWeeksOfMonth(kind, vy, month0)}

    ${fixedHtml}
  `;

  return html;

function renderMonthChips(activeMonth) {
  const months = getRelevantMonths();
  // Always include the next 6 future months too
  const today = new Date();
  for (let i = 1; i <= 6; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    const k = monthKey(d);
    if (!months.includes(k)) months.unshift(k);
  }
  // Sort: most recent first
  months.sort((a,b) => b.localeCompare(a));
  return months.map(m => {
    const [y, mo] = m.split('-').map(Number);
    const label = `${MONTHS_SHORT[mo-1]} ${y === today.getFullYear() ? '' : "'" + String(y).slice(2)}`.trim();
    return `<button class="month-chip ${m === activeMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${label}</button>`;
  }).join('');
}

function selectMonth(m) {
  currentMonth = m;
  render();
}

function renderWeeksOfMonth(kind, year, month0) {
  const isE = kind === 'earnings';
  const weeks = getWeeksForMonth(year, month0);
  const todayIso = todayISO();
  const dailyGoal = db.spending_daily_goal || 60;

  return weeks.map(week => {
    let weekTotal = 0;
    let activeDayCount = 0;
    const dayRows = week.dates.map(d => {
      const inMonth = isInMonth(d, year, month0);
      const iso = dateToISO(d);
      const val = Number(db[kind][iso] || 0);
      if (inMonth) {
        weekTotal += val;
        activeDayCount++;
      }
      const isToday = iso === todayIso;
      const overGoal = !isE && inMonth && val > dailyGoal;
      const cls = [
        'day-row',
        !inMonth ? 'blocked' : '',
        isToday ? 'today' : '',
        overGoal ? 'over-goal' : '',
      ].filter(Boolean).join(' ');
      return `
        <div class="${cls}">
          <div class="day-label">
            ${DAYS_SHORT[d.getDay()]}
            <span class="date-num">${d.getDate()}</span>
          </div>
          ${inMonth
            ? `<input type="number" inputmode="decimal" step="0.01" class="day-input"
                  value="${val > 0 ? val : ''}"
                  placeholder="—"
                  data-iso="${iso}"
                  data-kind="${kind}"
                  onchange="setDayValue(this)"
                  onfocus="this.select()">`
            : `<span class="blocked-marker">${MONTHS_SHORT[d.getMonth()]}</span>`}
        </div>
      `;
    }).join('');
    
    const goalForActive = !isE ? dailyGoal * activeDayCount : 0;
    const remaining = goalForActive - weekTotal;
    const overBy = weekTotal - goalForActive;

    return `
      <div class="week-block">
        <div class="week-header">
          <div class="week-title">${escHTML(week.label)}</div>
          <div class="week-meta">
            <div>${fmt$0(weekTotal)}</div>
            ${!isE && activeDayCount > 0 ? `<div class="goal-progress">of ${fmt$0(goalForActive)}</div>` : ''}
          </div>
        </div>
        <div class="day-rows">${dayRows}</div>
        ${!isE && activeDayCount > 0 ? `
          <div class="week-footer">
            <span class="total-label">${activeDayCount} day${activeDayCount !== 1 ? 's' : ''} this month</span>
            <span class="remaining ${overBy > 0 ? 'over' : ''}">
              ${overBy > 0 ? `Over by ${fmt$0(overBy)}` : `${fmt$0(remaining)} left of goal`}
            </span>
          </div>
        ` : `
          <div class="week-footer">
            <span class="total-label">Week total</span>
            <span class="remaining">${fmt$0(weekTotal)}</span>
          </div>
        `}
      </div>
    `;
  }).join('');
}

function renderFixedSpending(monthIso) {
  const fixed = getFixedForMonth(monthIso);
  const baseItems = db.fixed_spending;
  const overrides = db.fixed_overrides[monthIso] || [];

  const baseRows = baseItems.map((it, i) => {
    const noteId = `fs_${it.id}`;
    const hasNote = !!(db.fixed_notes[noteId]);
    return `
      <div class="fixed-row">
        <span class="item">${escHTML(it.item)}</span>
        <input type="number" inputmode="decimal" step="0.01" class="amt-input"
          value="${it.amount}"
          data-fixed-idx="${i}"
          onchange="updateFixedBaseAmount(this)">
        <button class="note-icon ${hasNote ? 'has-note' : ''}" onclick="editFixedNote('${noteId}', '${escHTML(it.item)}')" title="${hasNote ? 'Edit note' : 'Add note'}">
          ${hasNote ? '✎' : '+ note'}
        </button>
      </div>
      ${hasNote ? `<div class="fixed-note">${escHTML(db.fixed_notes[noteId])}</div>` : ''}
    `;
  }).join('');

  const overrideRows = overrides.map((it, i) => {
    const noteId = `fo_${monthIso}_${it.id}`;
    const hasNote = !!(db.fixed_notes[noteId]);
    return `
      <div class="fixed-row">
        <span class="item">${escHTML(it.item)} <span style="font-size:10px; color:var(--ink-soft); font-style:italic;">(this month only)</span></span>
        <input type="number" inputmode="decimal" step="0.01" class="amt-input"
          value="${it.amount}"
          data-override-month="${monthIso}"
          data-override-idx="${i}"
          onchange="updateFixedOverrideAmount(this)">
        <button class="delete-btn" onclick="deleteFixedOverride('${monthIso}', ${i})" title="Remove">×</button>
      </div>
      ${hasNote ? `<div class="fixed-note">${escHTML(db.fixed_notes[noteId])}</div>` : ''}
    `;
  }).join('');

  return `
    <div class="card fixed-panel">
      <h3>Fixed Spending — ${MONTHS[parseInt(monthIso.slice(5))-1]} ${monthIso.slice(0,4)}
        <span class="meta">${fmt$0(fixed.total)}</span>
      </h3>
      <div class="desc">Recurring monthly costs that aren't part of daily spending. Edit any amount inline; add a one-time extra cost specific to this month with the button below.</div>
      ${baseRows}
      ${overrideRows}
      <button class="add-row-btn" onclick="addFixedOverride('${monthIso}')">+ Add one-time fixed cost for ${MONTHS[parseInt(monthIso.slice(5))-1]} ${monthIso.slice(0,4)}</button>
    </div>
  `;
}

// ============================================================================
// HANDLERS
// ============================================================================
function setDayValue(input) {
  const iso = input.dataset.iso;
  const kind = input.dataset.kind;
  const val = parseFloat(input.value);
  if (input.value === '' || isNaN(val) || val === 0) {
    delete db[kind][iso];
  } else {
    db[kind][iso] = val;
  }
  saveDB();
  // Smart re-render: only when the change might affect totals/colors visibly
  // For input changes mid-edit, just save; render will happen on focus loss
  // But we DO need to update totals — just defer to a debounced render
  scheduleRender();
}

let _renderTimer = null;
function scheduleRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => render(), 350);
}

function addTodayAmount(kind) {
  const inp = document.getElementById('todayInput');
  const val = parseFloat(inp.value);
  if (isNaN(val) || val <= 0) {
    toast('Enter a positive number', 'error');
    inp.focus();
    return;
  }
  const iso = todayISO();
  const existing = Number(db[kind][iso] || 0);
  db[kind][iso] = existing + val;
  saveDBNow();
  inp.value = '';
  toast(`Added ${fmt$(val)} to today` + (existing > 0 ? ` (now ${fmt$(db[kind][iso])})` : ''));
  render();
}

function updateFixedBaseAmount(input) {
  const idx = parseInt(input.dataset.fixedIdx);
  const val = parseFloat(input.value);
  if (isNaN(val)) return;
  db.fixed_spending[idx].amount = val;
  saveDB();
  scheduleRender();
}

function updateFixedOverrideAmount(input) {
  const monthIso = input.dataset.overrideMonth;
  const idx = parseInt(input.dataset.overrideIdx);
  const val = parseFloat(input.value);
  if (isNaN(val)) return;
  db.fixed_overrides[monthIso][idx].amount = val;
  saveDB();
  scheduleRender();
}

function deleteFixedOverride(monthIso, idx) {
  if (!confirm('Remove this one-time fixed cost?')) return;
  db.fixed_overrides[monthIso].splice(idx, 1);
  if (db.fixed_overrides[monthIso].length === 0) delete db.fixed_overrides[monthIso];
  saveDBNow();
  render();
}

function addFixedOverride(monthIso) {
  openModal('Add one-time fixed cost', `
    <div class="field"><label>Item</label><input type="text" id="fo_item" placeholder="e.g., Annual fee, DMV registration"></div>
    <div class="field"><label>Amount ($)</label><input type="number" inputmode="decimal" step="0.01" id="fo_amt"></div>
    <div class="field"><label>Note (optional)</label><textarea id="fo_note" placeholder="Context, why this came up..."></textarea></div>
  `, () => {
    const item = document.getElementById('fo_item').value.trim();
    const amt = parseFloat(document.getElementById('fo_amt').value);
    const note = document.getElementById('fo_note').value.trim();
    if (!item) { alert('Item required'); return false; }
    if (isNaN(amt)) { alert('Amount required'); return false; }
    if (!Array.isArray(db.fixed_overrides[monthIso])) db.fixed_overrides[monthIso] = [];
    const id = 'fo_' + uid();
    db.fixed_overrides[monthIso].push({ id, item, amount: amt });
    if (note) db.fixed_notes[`fo_${monthIso}_${id}`] = note;
    saveDBNow();
    render();
  });
}

function editFixedNote(noteId, itemName) {
  const existing = db.fixed_notes[noteId] || '';
  openModal(`Note · ${itemName}`, `
    <div class="field"><label>Note</label><textarea id="note_input" placeholder="Anything worth remembering...">${escHTML(existing)}</textarea></div>
  `, () => {
    const v = document.getElementById('note_input').value.trim();
    if (v) db.fixed_notes[noteId] = v;
    else delete db.fixed_notes[noteId];
    saveDBNow();
    render();
  }, existing ? {
    onDelete: () => { delete db.fixed_notes[noteId]; saveDBNow(); render(); }
  } : {});
}

// ============================================================================
// CHARTS
// ============================================================================
let _chart = null;
let _chartView = '12w';

function switchChart(view) {
  _chartView = view;
  document.getElementById('chartTab12w').classList.toggle('active', view === '12w');
  document.getElementById('chartTab6m').classList.toggle('active', view === '6m');
  renderCharts(currentTab);
}

function renderCharts(tab) {
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById('trendChart');
  if (!canvas) return;
  const isE = tab === 'earnings';
  const accentColor = isE ? '#5b8a3a' : '#8b3a3a';
  const accentSoft = isE ? 'rgba(91, 138, 58, 0.15)' : 'rgba(139, 58, 58, 0.15)';

  let labels, values;
  if (_chartView === '12w') {
    // Last 12 weeks (Mon-Sun) ending with current week
    const now = new Date();
    const dow = now.getDay();
    const thisMon = new Date(now);
    thisMon.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow));
    labels = [];
    values = [];
    for (let i = 11; i >= 0; i--) {
      const ws = new Date(thisMon);
      ws.setDate(thisMon.getDate() - i * 7);
      const we = new Date(ws);
      we.setDate(ws.getDate() + 6);
      labels.push(`${ws.getMonth()+1}/${ws.getDate()}`);
      values.push(sumDateRange(tab, dateToISO(ws), dateToISO(we)));
    }
  } else {
    // Last 6 months (including current). For spending, ADD fixed costs.
    const now = new Date();
    labels = [];
    values = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const y = d.getFullYear();
      const m = d.getMonth();
      labels.push(`${MONTHS_SHORT[m]} ${String(y).slice(2)}`);
      let v = sumMonth(tab, y, m);
      if (!isE) v += getFixedForMonth(`${y}-${pad2(m+1)}`).total;
      values.push(v);
    }
  }

  if (_chart) _chart.destroy();

  const isLine = _chartView === '12w';
  _chart = new Chart(canvas.getContext('2d'), {
    type: isLine ? 'line' : 'bar',
    data: {
      labels,
      datasets: [{
        label: isE ? 'Earnings' : 'Spending',
        data: values,
        borderColor: accentColor,
        backgroundColor: isLine ? accentSoft : accentColor,
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: isLine,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => '$' + ctx.parsed.y.toLocaleString('en-US', { maximumFractionDigits: 0 }),
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b5e4c', font: { family: 'Inter', size: 10 } },
          grid: { display: false }
        },
        y: {
          ticks: {
            color: '#6b5e4c',
            font: { family: 'Inter', size: 10 },
            callback: (v) => '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 })
          },
          grid: { color: 'rgba(200, 184, 143, 0.3)' }
        }
      }
    }
  });
}

// ============================================================================
// BOOT
// ============================================================================
let _appBooted = false;
function bootApp() {
  if (_appBooted) return;
  _appBooted = true;
  render();
  if (window.__firebase) initSync();
  else window.addEventListener('firebase-ready', () => initSync(), { once: true });
}

window.addEventListener('DOMContentLoaded', () => {
  const checkAuth = () => {
    if (!window.__firebase) return;
    window.__firebase.onAuthStateChanged((user) => {
      if (user) {
        _currentUser = user;
        document.getElementById('signinGate').classList.add('hidden');
        bootApp();
      }
    });
  };
  if (window.__firebase) checkAuth();
  else window.addEventListener('firebase-ready', checkAuth, { once: true });
});

</script>

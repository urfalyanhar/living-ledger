<title>Har &amp; Lily — Living Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #faf6ef;
  --paper-warm: #f5ecd6;
  --paper-deep: #ebe1bc;
  --ink: #2d2620;
  --ink-soft: #6b5e4c;
  --rule: #c8b88f;
  --rule-soft: #e0d4ad;
  --accent: #8b3a3a;
  --positive: #2d7a2d;
  --positive-soft: rgba(180, 215, 145, 0.25);
  --negative: #b03030;
  --negative-soft: rgba(220, 130, 130, 0.18);
  --warn: #b08020;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
input, button, select, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; }

/* ===== Sign-in gate ===== */
.signin-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #f5ecd6 0%, #e8dcb8 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.signin-gate.hidden { display: none; }
.signin-card {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 4px;
  padding: 36px 28px;
  max-width: 380px; width: 100%;
  box-shadow: 0 8px 32px rgba(60, 50, 30, 0.2);
}
.signin-brand { text-align: center; margin-bottom: 24px; }
.signin-brand h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 600; margin: 0;
  letter-spacing: 0.02em;
}
.signin-brand h1 em { font-style: italic; color: var(--ink-soft); font-weight: 500; }
.signin-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-style: italic;
  color: var(--ink-soft); margin-top: 4px;
}
.signin-card form { display: flex; flex-direction: column; gap: 10px; }
.signin-card label {
  font-family: 'Inter', sans-serif; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-soft); font-weight: 600;
}
.signin-card input[type=email],
.signin-card input[type=password] {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  padding: 12px 14px;
  background: var(--paper-warm);
  border: 1.5px solid var(--rule-soft);
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  width: 100%;
  transition: border-color 0.15s ease;
}
.signin-card input:focus {
  border-color: var(--ink);
  background: var(--paper);
}
.signin-btn {
  margin-top: 10px;
  padding: 13px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.signin-btn:disabled { opacity: 0.5; }
.signin-error {
  min-height: 18px;
  font-size: 12px;
  color: var(--negative);
  text-align: center;
  font-style: italic;
  margin-top: 4px;
}

/* ===== Masthead ===== */
.masthead {
  border-bottom: 2px solid var(--ink);
  padding: 16px 18px 12px;
  background: var(--paper);
  position: sticky; top: 0; z-index: 50;
}
.masthead-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; max-width: 900px; margin: 0 auto;
  flex-wrap: wrap;
}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.brand em { font-style: italic; color: var(--ink-soft); font-weight: 500; }
.tools { display: flex; align-items: center; gap: 8px; }
.sync-pill {
  display: inline-flex; align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 12px;
  border: 1px solid var(--rule-soft);
  background: var(--paper-warm);
  color: var(--ink-soft);
}
.sync-synced { color: var(--positive); border-color: rgba(120, 168, 104, 0.5); background: var(--positive-soft); }
.sync-syncing { color: var(--warn); border-color: rgba(184, 168, 104, 0.5); }
.sync-offline { color: var(--negative); border-color: rgba(180, 100, 100, 0.5); background: var(--negative-soft); }
.btn-icon {
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 2px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--ink-soft);
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}
.btn-icon:hover { background: var(--paper-warm); color: var(--ink); }

/* ===== Tabs ===== */
.tabs {
  border-bottom: 1px solid var(--rule-soft);
  background: var(--paper);
  position: sticky; top: 60px; z-index: 40;
}
.tabs-inner {
  display: flex; max-width: 900px; margin: 0 auto;
}
.tab {
  flex: 1;
  padding: 14px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
  font-weight: 500;
  color: var(--ink-soft);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  transition: all 0.15s ease;
  cursor: pointer;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.tab:hover:not(.active) { color: var(--ink); background: var(--paper-warm); }

/* ===== Layout ===== */
main { max-width: 900px; margin: 0 auto; padding: 16px 14px 80px; }
.section { margin-bottom: 24px; }
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 24px;
  margin: 0 0 4px;
  letter-spacing: 0.01em;
}
h3 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 19px;
  margin: 0 0 10px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
h3 .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
}
.desc {
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;
  margin-bottom: 12px;
}

/* ===== Cards ===== */
.card {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 14px;
}
.card.accent {
  background: linear-gradient(160deg, var(--paper) 0%, var(--paper-warm) 100%);
  border: 1.5px solid var(--ink);
}

/* ===== Today card (top-of-tab quick-add) ===== */
.today-card {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 4px;
  padding: 18px 16px;
  margin-bottom: 18px;
  box-shadow: 0 2px 8px rgba(60, 50, 30, 0.06);
}
.today-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px; margin-bottom: 14px;
}
.today-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  line-height: 1.1;
}
.today-date em {
  font-style: italic;
  color: var(--ink-soft);
  font-weight: 500;
  font-size: 18px;
  display: block;
  margin-top: 2px;
}
.today-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: var(--ink);
  text-align: right;
}
.today-amount.spent { color: var(--accent); }
.today-amount.empty { color: var(--ink-soft); opacity: 0.5; }
.today-amount-btn {
  background: transparent;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  transition: background 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.today-amount-btn:hover { background: rgba(0,0,0,0.05); }
.today-amount-btn:active { background: rgba(0,0,0,0.10); transform: scale(0.97); }
.today-edit-hint {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  opacity: 0.6;
}

.today-input-row {
  display: flex; gap: 8px; align-items: stretch;
}
.today-input {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  padding: 14px 16px;
  background: var(--paper-warm);
  border: 1.5px solid var(--rule-soft);
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  text-align: right;
}
.today-input:focus { border-color: var(--ink); background: var(--paper); }
.today-add-btn {
  padding: 0 22px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.today-add-btn:active { transform: translateY(1px); }
.today-add-btn:disabled { opacity: 0.5; }

.today-week-summary {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule-soft);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.today-week-summary > div {
  text-align: center;
  padding: 6px 4px;
}
.today-week-summary .label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 4px;
}
.today-week-summary .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
}
.today-week-summary .sub {
  font-size: 10px;
  color: var(--ink-soft);
  font-style: italic;
  margin-top: 2px;
}

.progress-bar {
  height: 6px;
  background: var(--rule-soft);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-fill { height: 100%; transition: width 0.3s ease; }
.progress-fill.good { background: linear-gradient(90deg, #80a868, #b8d8a4); }
.progress-fill.warn { background: linear-gradient(90deg, #c8a050, #e0c878); }
.progress-fill.over { background: linear-gradient(90deg, #b03030, #d86060); }

/* ===== Stats row ===== */
.stats-row {

.stat {

  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 4px;
}
.stat .value {

  font-size: 17px;
  font-weight: 700;

.stat .value.pos { color: var(--positive); }
.stat .value.neg { color: var(--negative); }
.stat .sub {
  font-size: 10px;
  font-style: italic;

/* ===== 7-day rolling history ===== */
.rolling7 {

}

}
.rolling7-grid {

}
.r7-cell {
  display: flex;
  flex-direction: column;
  align-items: center;

}

}
.r7-cell.over {

}
.r7-cell.empty .r7-input { color: var(--ink-soft); }
.r7-day {

.r7-cell.over .r7-day { color: var(--negative); }
.r7-date {

  font-weight: 700;
  line-height: 1;

.r7-input {
  width: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 5px 4px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 2px;
  color: var(--ink);
  outline: none;
  text-align: center;
  font-weight: 600;
  min-width: 0;
}
.r7-input:focus {
  background: var(--paper);
  border-color: var(--ink);
}
.r7-cell.over .r7-input { color: var(--negative); }

/* ===== Months section header + hide-future toggle ===== */
.months-header {

}

  font-size: 18px;
  margin: 0;
}
.future-toggle {

  font-size: 12px;
  color: var(--ink-soft);

}

}

/* ===== Chart at bottom ===== */
.chart-bottom {

/* ===== Month cards (collapsible) ===== */
.month-card {

}
.month-card-summary {

}

.mc-title {

}
.mc-name {

  font-size: 21px;
  font-weight: 600;

}
.mc-name em {

  font-weight: 500;
}
.mc-tag-current {

/* ===== Chart container ===== */
.chart-container {

/* ===== Week display ===== */

  text-align: right;

}

}
.day-input.blocked-input { display: none; }
.day-row.blocked .blocked-marker {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-style: italic;
  color: var(--ink-soft);

}

.week-footer {

  font-size: 14px;

}
.week-footer .total-label {
  font-family: 'Inter', sans-serif;

  font-weight: 600;
}

/* ===== Fixed costs panel ===== */
.fixed-panel {
  margin-top: 18px;
}
.fixed-row {

}

}
.manage-fixed-row {

}

  font-size: 14px;
  font-weight: 600;

}

/* ===== Modal ===== */
.modal-bg {

.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

.modal-actions .btn-save { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.modal-actions .btn-delete { background: var(--negative); color: var(--paper); border-color: var(--negative); margin-right: auto; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--ink);
  color: var(--paper);

}

function pad2(n) { return String(n).padStart(2, '0'); }
function dateToISO(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function monthKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function todayISO() { return dateToISO(new Date()); }
function todayMonthKey() { return monthKey(new Date()); }

function parseISO(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmt$(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Number(n);
  return (v < 0 ? '-' : '') + '$' + Math.abs(v).toFixed(2);
}
function fmt$0(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Number(n);
  return (v < 0 ? '-' : '') + '$' + Math.abs(v).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function escHTML(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.className = 'toast', 2200);
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function openModal(title, html, onSave, opts = {}) {
  const bg = document.getElementById('modalBg');
  const m = document.getElementById('modal');
  m.innerHTML = `
    <h3>${escHTML(title)}</h3>
    ${html}
    <div class="modal-actions">
      ${opts.onDelete ? `<button class="btn-delete" id="mDel">Delete</button>` : ''}
      <button class="btn-cancel" id="mCancel">Cancel</button>
      <button class="btn-save" id="mSave">${opts.saveLabel || 'Save'}</button>
    </div>
  `;
  bg.classList.add('show');
  m.querySelector('#mCancel').onclick = closeModal;
  m.querySelector('#mSave').onclick = () => { if (onSave() !== false) closeModal(); };
  if (opts.onDelete) m.querySelector('#mDel').onclick = () => {
    if (opts.onDelete() !== false) closeModal();
  };
  bg.onclick = (e) => { if (e.target === bg) closeModal(); };
  // Focus first input
  setTimeout(() => { const inp = m.querySelector('input,textarea'); if (inp) inp.focus(); }, 50);
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

// ============================================================================
// MONTH / WEEK COMPUTATION
// ============================================================================

// Get all months that have ANY data, plus the current month
function getRelevantMonths() {
  const set = new Set();
  set.add(todayMonthKey());
  for (const k of Object.keys(db.earnings)) set.add(k.slice(0, 7));
  for (const k of Object.keys(db.spending)) set.add(k.slice(0, 7));
  return Array.from(set).sort().reverse();
}

// Get all weeks that overlap a given month — Mon-Sun convention
// Returns: [{ start: Date, dates: [Date×7], label: 'May 5 - 11' }]
function getWeeksForMonth(year, month0) {
  const first = new Date(year, month0, 1);
  const last = new Date(year, month0 + 1, 0);
  // Find Monday on or before first
  const firstDow = first.getDay(); // 0=Sun, 1=Mon, ...
  const startMon = new Date(first);
  const offsetToMon = firstDow === 0 ? -6 : 1 - firstDow;
  startMon.setDate(first.getDate() + offsetToMon);
  const weeks = [];
  let cursor = new Date(startMon);
  while (cursor <= last) {
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(cursor);
      d.setDate(cursor.getDate() + i);
      dates.push(d);
    }
    weeks.push({
      start: dates[0],
      dates,
      label: weekLabel(dates),
    });
    cursor.setDate(cursor.getDate() + 7);
  }
  return weeks;
}

function weekLabel(dates) {
  // 'May 5 - 11' or 'May 26 - June 1'
  const startMon = MONTHS_SHORT[dates[0].getMonth()];
  const endMon = MONTHS_SHORT[dates[6].getMonth()];
  if (startMon === endMon) return `${startMon} ${dates[0].getDate()} – ${dates[6].getDate()}`;
  return `${startMon} ${dates[0].getDate()} – ${endMon} ${dates[6].getDate()}`;
}

function isInMonth(d, year, month0) {
  return d.getFullYear() === year && d.getMonth() === month0;
}

// Sum of values in a date range for a given kind ('earnings' or 'spending')
function sumDateRange(kind, fromISO, toISO) {
  let s = 0;
  for (const k in db[kind]) {
    if (k >= fromISO && k <= toISO) s += Number(db[kind][k]) || 0;
  }
  return s;
}

function sumMonth(kind, year, month0) {
  const from = `${year}-${pad2(month0+1)}-01`;
  const last = new Date(year, month0+1, 0).getDate();
  const to = `${year}-${pad2(month0+1)}-${pad2(last)}`;
  return sumDateRange(kind, from, to);
}

function countDaysWithData(kind, year, month0) {
  const prefix = `${year}-${pad2(month0+1)}-`;
  let c = 0;
  for (const k in db[kind]) {
    if (k.startsWith(prefix) && Number(db[kind][k]) > 0) c++;
  }
  return c;
}

// ============================================================================
// FIXED SPENDING
// ============================================================================
function isFixedItemActiveInMonth(item, monthIso) {
  if (item.start_month && monthIso < item.start_month) return false;
  if (item.end_month && monthIso > item.end_month) return false;
  return true;
}

function getFixedForMonth(monthIso) {
  // Returns { items: [{...}], total } — only includes items active in this month
  const items = db.fixed_spending.filter(it => isFixedItemActiveInMonth(it, monthIso));
  if (db.fixed_overrides[monthIso]) {
    for (const x of db.fixed_overrides[monthIso]) items.push(x);
  }
  const total = items.reduce((s,x) => s + (Number(x.amount) || 0), 0);
  return { items, total };
}

// RENDER

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabEarnings').classList.toggle('active', tab === 'earnings');
  document.getElementById('tabSpending').classList.toggle('active', tab === 'spending');
  render();
}

function render() {
  // Capture which month cards are open (preserves user expansion state across re-renders)
  captureOpenMonths();
  const c = document.getElementById('content');
  c.innerHTML = renderTab(currentTab);
  // Render charts after DOM is ready
  setTimeout(() => renderCharts(currentTab), 0);
  // Wire up the month-card toggles to track open state
  wireMonthCardToggles();
}

function captureOpenMonths() {
  const cards = document.querySelectorAll('.month-card');
  if (cards.length === 0) return; // initial render
  const set = _openMonths[currentTab];
  // Only update state for months that are currently visible — preserves
  // open state for hidden months when the user toggles "hide future" back off
  cards.forEach(card => {
    const id = card.id;
    if (!id.startsWith('mc_')) return;
    const monthIso = id.slice(3);
    if (card.open) set.add(monthIso);
    else set.delete(monthIso);
  });
}

function wireMonthCardToggles() {
  const set = _openMonths[currentTab];
  document.querySelectorAll('.month-card').forEach(card => {
    card.addEventListener('toggle', () => {
      const id = card.id.slice(3);
      if (card.open) set.add(id);
      else set.delete(id);
    });
  });
}

function renderTab(tab) {
  const isE = tab === 'earnings';
  const kind = tab;

  // Top: Today card (unchanged)
  const today = new Date();
  const todayIso = dateToISO(today);
  const todayVal = Number(db[kind][todayIso] || 0);

  const dow = today.getDay();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + (dow === 0 ? -6 : 1 - dow));
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  const weekTotal = sumDateRange(kind, dateToISO(weekStart), dateToISO(weekEnd));
  const dailyGoal = db.spending_daily_goal || 60;
  const weekGoal = dailyGoal * 7;
  const weekRemaining = weekGoal - weekTotal;
  let weekProgress = 0;
  let weekProgressClass = 'good';
  if (!isE) {
    weekProgress = Math.min(100, (weekTotal / weekGoal) * 100);
    if (weekTotal > weekGoal) weekProgressClass = 'over';
    else if (weekTotal > weekGoal * 0.8) weekProgressClass = 'warn';
  }

  const todayMo = todayMonthKey();
  const allMonths = getAllMonthsForView();
  const hideFuture = !!(db.ui && db.ui.hide_future);
  const visibleMonths = hideFuture
    ? allMonths.filter(m => m <= todayMo)
    : allMonths;
  const futureCount = allMonths.length - visibleMonths.length;

  // Build 7-day rolling history (last 7 days ending TODAY)
  const rolling7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = dateToISO(d);
    rolling7.push({
      date: d, iso,
      val: Number(db[kind][iso] || 0),
      isToday: i === 0,
    });
  }
  const rolling7Total = rolling7.reduce((s, x) => s + x.val, 0);
  const rolling7Avg = rolling7Total / 7;

  let html = `
    <!-- Today card -->
    <div class="today-card">
      <div class="today-header">
        <div>
          <div class="today-date">${MONTHS[today.getMonth()]} ${today.getDate()}</div>
          <em>${DAYS_LONG[today.getDay()]}</em>
        </div>
        <button class="today-amount ${todayVal > 0 ? (isE ? '' : 'spent') : 'empty'} today-amount-btn"
          onclick="editTodayAmount('${kind}', '${todayIso}', ${todayVal})"
          title="Tap to edit today's amount">
          ${todayVal > 0 ? fmt$(todayVal) : '—'}
          ${todayVal > 0 ? '<span class="today-edit-hint">✎</span>' : ''}
        </button>
      </div>
      <div class="today-input-row">
        <input type="number" inputmode="decimal" step="0.01" id="todayInput" class="today-input"
          placeholder="${isE ? 'Amount earned today' : 'Amount spent today'}"
          onkeydown="if(event.key==='Enter')addTodayAmount('${kind}')">
        <button class="today-add-btn" onclick="addTodayAmount('${kind}')">Add</button>
      </div>
      <div class="today-week-summary">
        <div>
          <div class="label">Week-to-date</div>
          <div class="value ${isE ? 'pos' : ''}">${fmt$0(weekTotal)}</div>
          ${!isE ? `
            <div class="progress-bar"><div class="progress-fill ${weekProgressClass}" style="width: ${weekProgress}%"></div></div>
            <div class="sub">${fmt$0(Math.abs(weekRemaining))} ${weekRemaining >= 0 ? 'left' : 'over'} of ${fmt$0(weekGoal)} goal</div>
          ` : `<div class="sub">${MONTHS_SHORT[weekStart.getMonth()]} ${weekStart.getDate()} – ${MONTHS_SHORT[weekEnd.getMonth()]} ${weekEnd.getDate()}</div>`}
        </div>
        <div>
          <div class="label">Today's ${isE ? 'pace' : 'budget'}</div>
          ${isE
            ? `<div class="value">—</div><div class="sub">log as you go</div>`
            : `<div class="value ${todayVal > dailyGoal ? 'neg' : ''}">${fmt$0(dailyGoal - todayVal)}</div>
               <div class="sub">${todayVal > dailyGoal ? `over by ${fmt$0(todayVal - dailyGoal)}` : `left of ${fmt$0(dailyGoal)}`}</div>`}
        </div>
      </div>
    </div>

    <!-- 7-day rolling history -->
    <div class="rolling7">
      <div class="rolling7-header">
        <h3 style="display:block; margin: 0;">Last 7 days <span class="meta">${fmt$0(rolling7Total)} · avg ${fmt$0(rolling7Avg)}/day</span></h3>
      </div>
      <div class="rolling7-grid">
        ${rolling7.map(r => {
          const overGoal = !isE && r.val > dailyGoal;
          const cls = ['r7-cell', r.isToday ? 'today' : '', overGoal ? 'over' : '', r.val === 0 ? 'empty' : ''].filter(Boolean).join(' ');
          return `
            <div class="${cls}">
              <div class="r7-day">${DAYS_SHORT[r.date.getDay()]}</div>
              <div class="r7-date">${r.date.getDate()}</div>
              <input type="number" inputmode="decimal" step="0.01" class="r7-input"
                value="${r.val > 0 ? r.val : ''}"
                placeholder="—"
                data-iso="${r.iso}"
                data-kind="${kind}"
                onchange="setDayValue(this)"
                onfocus="this.select()">
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- Months section header with hide-future toggle -->
    <div class="months-header">
      <h3 style="display:block; margin: 0;">All months</h3>
      <label class="future-toggle">
        <input type="checkbox" ${hideFuture ? 'checked' : ''} onchange="toggleHideFuture(this.checked)">
        <span>Hide future months${futureCount > 0 && hideFuture ? ` (${futureCount})` : ''}</span>
      </label>
    </div>

    <!-- All months as collapsible cards (newest first) -->
    <div id="monthsList">
      ${visibleMonths.map(m => renderMonthCard(kind, m, m === todayMo)).join('')}
    </div>

    <!-- Chart at the BOTTOM -->
    <div class="chart-container chart-bottom">
      <h3 style="display:block; margin: 0 0 8px;">Trends</h3>
      <div class="chart-tabs">
        <button class="chart-tab active" id="chartTab12w" onclick="switchChart('12w')">12-week trend</button>
        <button class="chart-tab" id="chartTab6m" onclick="switchChart('6m')">6-month bars</button>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="trendChart"></canvas>
      </div>
    </div>
  `;
  return html;
}

function toggleHideFuture(checked) {
  if (!db.ui || typeof db.ui !== 'object') db.ui = {};
  db.ui.hide_future = checked;
  saveDBNow();
  render();
}

// Build the list of months to display: every month with data + current + future months through May 2028
function getAllMonthsForView() {
  const set = new Set();
  set.add(todayMonthKey());
  for (const k of Object.keys(db.earnings)) set.add(k.slice(0, 7));
  for (const k of Object.keys(db.spending)) set.add(k.slice(0, 7));
  // Add every month from current through May 2028
  const today = new Date();
  const cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  const endDate = new Date(2028, 4, 1); // May 2028 (month index 4)
  while (cursor <= endDate) {
    set.add(monthKey(cursor));
    cursor.setMonth(cursor.getMonth() + 1);
  }
  return Array.from(set).sort().reverse();
}

function renderMonthCard(kind, monthIso, isCurrentMonth) {
  const isE = kind === 'earnings';
  const [vy, vm] = monthIso.split('-').map(Number);
  const month0 = vm - 1;
  const monthSum = sumMonth(kind, vy, month0);
  const daysInMonth = new Date(vy, month0 + 1, 0).getDate();
  const daysWithData = countDaysWithData(kind, vy, month0);
  const dailyAvg = daysWithData > 0 ? monthSum / daysWithData : 0;
  const weeksInMonth = getWeeksForMonth(vy, month0);
  const weeklyAvg = weeksInMonth.length > 0 ? monthSum / weeksInMonth.length : 0;

  let fixedTotal = 0;
  let fixedHtml = '';
  if (!isE) {
    const fixed = getFixedForMonth(monthIso);
    fixedTotal = fixed.total;
    fixedHtml = renderFixedSpending(monthIso);
  }
  const monthGrandTotal = !isE ? monthSum + fixedTotal : monthSum;

  // Open if this is current month (default) OR user has explicitly opened it before
  const set = _openMonths[kind];
  const isFirstRender = set.size === 0;
  const isOpen = (isFirstRender && isCurrentMonth) || set.has(monthIso);
  if (isFirstRender && isCurrentMonth) set.add(monthIso); // seed the default

  return `
    <details class="month-card" id="mc_${monthIso}" ${isOpen ? 'open' : ''}>
      <summary class="month-card-summary">
        <div class="mc-title">
          <span class="mc-name">${MONTHS[month0]} <em>${vy}</em></span>
          ${isCurrentMonth ? '<span class="mc-tag-current">current</span>' : ''}
        </div>
        <div class="mc-summary-amount ${isE ? 'pos' : ''}">${fmt$0(isE ? monthSum : monthGrandTotal)}</div>
        <span class="mc-chevron">▾</span>
      </summary>
      <div class="month-card-body">
        <div class="stats-row">
          <div class="stat">
            <div class="label">Total</div>
            <div class="value ${isE ? 'pos' : ''}">${fmt$0(isE ? monthSum : monthGrandTotal)}</div>
            <div class="sub">${isE ? `${daysWithData} days logged` : `${fmt$0(monthSum)} daily + ${fmt$0(fixedTotal)} fixed`}</div>
          </div>
          <div class="stat">
            <div class="label">Daily Avg</div>
            <div class="value">${fmt$0(dailyAvg)}</div>
            <div class="sub">${daysWithData} day${daysWithData !== 1 ? 's' : ''}</div>
          </div>
          <div class="stat">
            <div class="label">${isE ? 'Days Logged' : 'Weekly Avg'}</div>
            <div class="value">${isE ? daysWithData : fmt$0(weeklyAvg)}</div>
            <div class="sub">${isE ? `of ${daysInMonth}` : `${weeksInMonth.length} weeks`}</div>
          </div>
        </div>

        ${renderWeeksOfMonth(kind, vy, month0)}

        ${fixedHtml}
      </div>
    </details>
  `;
}

function renderWeeksOfMonth(kind, year, month0) {
  const isE = kind === 'earnings';
  const weeks = getWeeksForMonth(year, month0);
  const todayIso = todayISO();
  const dailyGoal = db.spending_daily_goal || 60;

  return weeks.map(week => {
    let weekTotal = 0;
    let activeDayCount = 0;
    const dayRows = week.dates.map(d => {
      const inMonth = isInMonth(d, year, month0);
      const iso = dateToISO(d);
      const val = Number(db[kind][iso] || 0);
      if (inMonth) {
        weekTotal += val;
        activeDayCount++;
      }
      const isToday = iso === todayIso;
      const overGoal = !isE && inMonth && val > dailyGoal;
      const cls = [
        'day-row',
        !inMonth ? 'blocked' : '',
        isToday ? 'today' : '',
        overGoal ? 'over-goal' : '',
      ].filter(Boolean).join(' ');
      return `
        <div class="${cls}">
          <div class="day-label">
            ${DAYS_SHORT[d.getDay()]}
            <span class="date-num">${d.getDate()}</span>
          </div>
          ${inMonth
            ? `<input type="number" inputmode="decimal" step="0.01" class="day-input"
                  value="${val > 0 ? val : ''}"
                  placeholder="—"
                  data-iso="${iso}"
                  data-kind="${kind}"
                  onchange="setDayValue(this)"
                  onfocus="this.select()">`
            : `<span class="blocked-marker">${MONTHS_SHORT[d.getMonth()]}</span>`}
        </div>
      `;
    }).join('');
    
    const goalForActive = !isE ? dailyGoal * activeDayCount : 0;
    const remaining = goalForActive - weekTotal;
    const overBy = weekTotal - goalForActive;

    return `
      <div class="week-block">
        <div class="week-header">
          <div class="week-title">${escHTML(week.label)}</div>
          <div class="week-meta">
            <div>${fmt$0(weekTotal)}</div>
            ${!isE && activeDayCount > 0 ? `<div class="goal-progress">of ${fmt$0(goalForActive)}</div>` : ''}
          </div>
        </div>
        <div class="day-rows">${dayRows}</div>
        ${!isE && activeDayCount > 0 ? `
          <div class="week-footer">
            <span class="total-label">${activeDayCount} day${activeDayCount !== 1 ? 's' : ''} this month</span>
            <span class="remaining ${overBy > 0 ? 'over' : ''}">
              ${overBy > 0 ? `Over by ${fmt$0(overBy)}` : `${fmt$0(remaining)} left of goal`}
            </span>
          </div>
        ` : `
          <div class="week-footer">
            <span class="total-label">Week total</span>
            <span class="remaining">${fmt$0(weekTotal)}</span>
          </div>
        `}
      </div>
    `;
  }).join('');
}

function renderFixedSpending(monthIso) {
  const fixed = getFixedForMonth(monthIso);
  const activeBaseItems = db.fixed_spending
    .map((it, i) => ({ it, i }))
    .filter(({ it }) => isFixedItemActiveInMonth(it, monthIso));
  const inactiveCount = db.fixed_spending.length - activeBaseItems.length;
  const overrides = db.fixed_overrides[monthIso] || [];

  const baseRows = activeBaseItems.map(({ it, i }) => {
    const noteId = `fs_${it.id}`;
    const hasNote = !!(db.fixed_notes[noteId]);
    // Build a small range hint: "from Feb 2026" / "until Apr 2027" / "Feb 2026 – Apr 2027"
    let rangeHint = '';
    if (it.start_month || it.end_month) {
      const fmt = (m) => m ? `${MONTHS_SHORT[parseInt(m.slice(5))-1]} ${m.slice(0,4)}` : null;
      const s = fmt(it.start_month);
      const e = fmt(it.end_month);
      if (s && e) rangeHint = `${s} – ${e}`;
      else if (s) rangeHint = `from ${s}`;
      else if (e) rangeHint = `until ${e}`;
    }
    return `
      <div class="fixed-row">
        <span class="item">
          ${escHTML(it.item)}
          ${rangeHint ? `<span class="fixed-range-hint">${rangeHint}</span>` : ''}
        </span>
        <input type="number" inputmode="decimal" step="0.01" class="amt-input"
          value="${it.amount}"
          data-fixed-idx="${i}"
          onchange="updateFixedBaseAmount(this)">
        <button class="note-icon ${hasNote ? 'has-note' : ''}" onclick="editFixedNote('${noteId}', '${escHTML(it.item)}')" title="${hasNote ? 'Edit note' : 'Add note'}">
          ${hasNote ? '✎' : '+ note'}
        </button>
      </div>
      ${hasNote ? `<div class="fixed-note">${escHTML(db.fixed_notes[noteId])}</div>` : ''}
    `;
  }).join('');

  const overrideRows = overrides.map((it, i) => {
    const noteId = `fo_${monthIso}_${it.id}`;
    const hasNote = !!(db.fixed_notes[noteId]);
    return `
      <div class="fixed-row">
        <span class="item">${escHTML(it.item)} <span style="font-size:10px; color:var(--ink-soft); font-style:italic;">(this month only)</span></span>
        <input type="number" inputmode="decimal" step="0.01" class="amt-input"
          value="${it.amount}"
          data-override-month="${monthIso}"
          data-override-idx="${i}"
          onchange="updateFixedOverrideAmount(this)">
        <button class="delete-btn" onclick="deleteFixedOverride('${monthIso}', ${i})" title="Remove">×</button>
      </div>
      ${hasNote ? `<div class="fixed-note">${escHTML(db.fixed_notes[noteId])}</div>` : ''}
    `;
  }).join('');

  return `
    <div class="card fixed-panel">
      <h3>Fixed Spending — ${MONTHS[parseInt(monthIso.slice(5))-1]} ${monthIso.slice(0,4)}
        <span class="meta">${fmt$0(fixed.total)}</span>
      </h3>
      <div class="desc">
        Recurring monthly costs. Edit any amount inline (applies across all active months).
        ${inactiveCount > 0 ? `<strong>${inactiveCount}</strong> item${inactiveCount !== 1 ? 's' : ''} inactive this month.` : ''}
        Use <em>Manage active dates</em> to set when an item starts or ends.
      </div>
      <button class="add-row-btn" style="margin-bottom: 8px;" onclick="openManageFixedDates()">Manage active dates</button>
      ${baseRows || '<div style="padding: 10px; color: var(--ink-soft); font-style: italic; font-size: 13px;">No recurring items active this month.</div>'}
      ${overrideRows}
      <button class="add-row-btn" onclick="addFixedOverride('${monthIso}')">+ Add one-time fixed cost for ${MONTHS[parseInt(monthIso.slice(5))-1]} ${monthIso.slice(0,4)}</button>
    </div>
  `;
}

function openManageFixedDates() {
  const items = db.fixed_spending;
  // Build the full list of month options once
  const allMonths = [];
  {
    const cursor = new Date(2025, 0, 1);
    const end = new Date(2028, 4, 1);
    while (cursor <= end) {
      allMonths.push(monthKey(cursor));
      cursor.setMonth(cursor.getMonth() + 1);
    }
  }
  const buildOptions = (selectedKey) => {
    const opts = [`<option value="" ${!selectedKey ? 'selected' : ''}>— always —</option>`];
    for (const k of allMonths) {
      const sel = k === selectedKey ? 'selected' : '';
      opts.push(`<option value="${k}" ${sel}>${MONTHS_SHORT[parseInt(k.slice(5))-1]} ${k.slice(0,4)}</option>`);
    }
    return opts.join('');
  };

  const html = `
    <div class="desc" style="margin-bottom: 12px;">
      Set when each recurring cost starts and stops. Leave blank for "always active." Items only count toward months in their active range.
    </div>
    <div class="manage-fixed-list">
      ${items.map((it, i) => `
        <div class="manage-fixed-row" data-idx="${i}">
          <div class="mf-name">${escHTML(it.item)} <span class="mf-amount">${fmt$0(it.amount)}/mo</span></div>
          <div class="mf-controls">
            <label>From</label>
            <select class="mf-start" data-idx="${i}">${buildOptions(it.start_month)}</select>
            <label>To</label>
            <select class="mf-end" data-idx="${i}">${buildOptions(it.end_month)}</select>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  openModal('Manage fixed-cost active dates', html, () => {
    document.querySelectorAll('.mf-start').forEach(sel => {
      const idx = parseInt(sel.dataset.idx);
      db.fixed_spending[idx].start_month = sel.value || null;
    });
    document.querySelectorAll('.mf-end').forEach(sel => {
      const idx = parseInt(sel.dataset.idx);
      db.fixed_spending[idx].end_month = sel.value || null;
    });
    saveDBNow();
    render();
    toast('Active dates updated');
  });
}

// ============================================================================
// HANDLERS
// ============================================================================
function setDayValue(input) {
  const iso = input.dataset.iso;
  const kind = input.dataset.kind;
  const val = parseFloat(input.value);
  if (input.value === '' || isNaN(val) || val === 0) {
    delete db[kind][iso];
  } else {
    db[kind][iso] = val;
  }
  saveDB();
  // Smart re-render: only when the change might affect totals/colors visibly
  // For input changes mid-edit, just save; render will happen on focus loss
  // But we DO need to update totals — just defer to a debounced render
  scheduleRender();
}

let _renderTimer = null;
function scheduleRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => render(), 350);
}

function editTodayAmount(kind, iso, currentVal) {
  const label = kind === 'earnings' ? 'earnings' : 'spending';
  openModal(`Edit today's ${label}`, `
    <div class="field">
      <label>Today's total (replaces current amount)</label>
      <input type="number" inputmode="decimal" step="0.01" id="editTodayVal"
        value="${currentVal > 0 ? currentVal : ''}" placeholder="0.00">
    </div>
    <p style="font-size:12px; color:var(--ink-soft); font-style:italic; margin-top:8px;">
      This sets the full day total. To add on top, use the Add field below instead.
    </p>
  `, () => {
    const raw = document.getElementById('editTodayVal').value.trim();
    const val = parseFloat(raw);
    if (raw === '' || val === 0) {
      delete db[kind][iso];
      saveDBNow();
      toast("Today's amount cleared");
      render();
    } else if (!isNaN(val) && val > 0) {
      db[kind][iso] = val;
      saveDBNow();
      toast(`Today updated to ${fmt$(val)}`);
      render();
    } else {
      toast('Enter a positive amount', 'error');
      return false;
    }
  }, currentVal > 0 ? {
    saveLabel: 'Update',
    onDelete: () => {
      delete db[kind][iso];
      saveDBNow();
      toast("Today's amount cleared");
      render();
    },
  } : { saveLabel: 'Set' });
}

function addTodayAmount(kind) {
  const inp = document.getElementById('todayInput');
  const val = parseFloat(inp.value);
  if (isNaN(val) || val <= 0) {
    toast('Enter a positive number', 'error');
    inp.focus();
    return;
  }
  const iso = todayISO();
  const existing = Number(db[kind][iso] || 0);
  db[kind][iso] = existing + val;
  saveDBNow();
  inp.value = '';
  toast(`Added ${fmt$(val)} to today` + (existing > 0 ? ` (now ${fmt$(db[kind][iso])})` : ''));
  render();
}

function updateFixedBaseAmount(input) {
  const idx = parseInt(input.dataset.fixedIdx);
  const val = parseFloat(input.value);
  if (isNaN(val)) return;
  db.fixed_spending[idx].amount = val;
  saveDB();
  scheduleRender();
}

function updateFixedOverrideAmount(input) {
  const monthIso = input.dataset.overrideMonth;
  const idx = parseInt(input.dataset.overrideIdx);
  const val = parseFloat(input.value);
  if (isNaN(val)) return;
  db.fixed_overrides[monthIso][idx].amount = val;
  saveDB();
  scheduleRender();
}

function deleteFixedOverride(monthIso, idx) {
  if (!confirm('Remove this one-time fixed cost?')) return;
  db.fixed_overrides[monthIso].splice(idx, 1);
  if (db.fixed_overrides[monthIso].length === 0) delete db.fixed_overrides[monthIso];
  saveDBNow();
  render();
}

function addFixedOverride(monthIso) {
  openModal('Add one-time fixed cost', `
    <div class="field"><label>Item</label><input type="text" id="fo_item" placeholder="e.g., Annual fee, DMV registration"></div>
    <div class="field"><label>Amount ($)</label><input type="number" inputmode="decimal" step="0.01" id="fo_amt"></div>
    <div class="field"><label>Note (optional)</label><textarea id="fo_note" placeholder="Context, why this came up..."></textarea></div>
  `, () => {
    const item = document.getElementById('fo_item').value.trim();
    const amt = parseFloat(document.getElementById('fo_amt').value);
    const note = document.getElementById('fo_note').value.trim();
    if (!item) { alert('Item required'); return false; }
    if (isNaN(amt)) { alert('Amount required'); return false; }
    if (!Array.isArray(db.fixed_overrides[monthIso])) db.fixed_overrides[monthIso] = [];
    const id = 'fo_' + uid();
    db.fixed_overrides[monthIso].push({ id, item, amount: amt });
    if (note) db.fixed_notes[`fo_${monthIso}_${id}`] = note;
    saveDBNow();
    render();
  });
}

function editFixedNote(noteId, itemName) {
  const existing = db.fixed_notes[noteId] || '';
  openModal(`Note · ${itemName}`, `
    <div class="field"><label>Note</label><textarea id="note_input" placeholder="Anything worth remembering...">${escHTML(existing)}</textarea></div>
  `, () => {
    const v = document.getElementById('note_input').value.trim();
    if (v) db.fixed_notes[noteId] = v;
    else delete db.fixed_notes[noteId];
    saveDBNow();
    render();
  }, existing ? {
    onDelete: () => { delete db.fixed_notes[noteId]; saveDBNow(); render(); }
  } : {});
}

// ============================================================================
// CHARTS
// ============================================================================
let _chart = null;
let _chartView = '12w';

function switchChart(view) {
  _chartView = view;
  document.getElementById('chartTab12w').classList.toggle('active', view === '12w');
  document.getElementById('chartTab6m').classList.toggle('active', view === '6m');
  renderCharts(currentTab);
}

function renderCharts(tab) {
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById('trendChart');
  if (!canvas) return;
  const isE = tab === 'earnings';
  const accentColor = isE ? '#5b8a3a' : '#8b3a3a';
  const accentSoft = isE ? 'rgba(91, 138, 58, 0.15)' : 'rgba(139, 58, 58, 0.15)';

  let labels, values;
  if (_chartView === '12w') {
    // Last 12 weeks (Mon-Sun) ending with current week
    const now = new Date();
    const dow = now.getDay();
    const thisMon = new Date(now);
    thisMon.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow));
    labels = [];
    values = [];
    for (let i = 11; i >= 0; i--) {
      const ws = new Date(thisMon);
      ws.setDate(thisMon.getDate() - i * 7);
      const we = new Date(ws);
      we.setDate(ws.getDate() + 6);
      labels.push(`${ws.getMonth()+1}/${ws.getDate()}`);
      values.push(sumDateRange(tab, dateToISO(ws), dateToISO(we)));
    }
  } else {
    // Last 6 months (including current). For spending, ADD fixed costs.
    const now = new Date();
    labels = [];
    values = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const y = d.getFullYear();
      const m = d.getMonth();
      labels.push(`${MONTHS_SHORT[m]} ${String(y).slice(2)}`);
      let v = sumMonth(tab, y, m);
      if (!isE) v += getFixedForMonth(`${y}-${pad2(m+1)}`).total;
      values.push(v);
    }
  }

  if (_chart) _chart.destroy();

  const isLine = _chartView === '12w';
  _chart = new Chart(canvas.getContext('2d'), {
    type: isLine ? 'line' : 'bar',
    data: {
      labels,
      datasets: [{
        label: isE ? 'Earnings' : 'Spending',
        data: values,
        borderColor: accentColor,
        backgroundColor: isLine ? accentSoft : accentColor,
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: isLine,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => '$' + ctx.parsed.y.toLocaleString('en-US', { maximumFractionDigits: 0 }),
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b5e4c', font: { family: 'Inter', size: 10 } },
          grid: { display: false }
        },
        y: {
          ticks: {
            color: '#6b5e4c',
            font: { family: 'Inter', size: 10 },
            callback: (v) => '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 })
          },
          grid: { color: 'rgba(200, 184, 143, 0.3)' }
        }
      }
    }
  });
}

// ============================================================================
// BOOT
// ============================================================================
let _appBooted = false;
function bootApp() {
  if (_appBooted) return;
  _appBooted = true;
  render();
  if (window.__firebase) initSync();
  else window.addEventListener('firebase-ready', () => initSync(), { once: true });
}

window.addEventListener('DOMContentLoaded', () => {
  const checkAuth = () => {
    if (!window.__firebase) return;
    window.__firebase.onAuthStateChanged((user) => {
      if (user) {
        _currentUser = user;
        document.getElementById('signinGate').classList.add('hidden');
        bootApp();
      }
    });
  };
  if (window.__firebase) checkAuth();
  else window.addEventListener('firebase-ready', checkAuth, { once: true });
});

</script>

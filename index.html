<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Har & Lily — Living Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #16110a;
  --ink-soft: #5a4f3f;
  --ink-mid: #3a3225;
  --paper: #faf6ef;
  --paper-warm: #f0e8d6;
  --paper-deep: #e5dac2;
  --rule: #b9ad94;
  --rule-soft: #d6cdb8;
  --accent: #8b2c19;
  --accent-soft: #c25840;
  --gold: #a37b2c;
  --green: #3e6030;
  --green-soft: #6b8a5d;
  --red: #a8331f;
  --blue: #2c4a6b;
  --shadow-sm: 0 1px 2px rgba(22,17,10,0.04);
  --shadow: 0 1px 3px rgba(22,17,10,0.06), 0 4px 16px rgba(22,17,10,0.05);
  --shadow-lg: 0 8px 30px rgba(22,17,10,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(163,123,44,0.045) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(139,44,25,0.035) 0%, transparent 50%);
  min-height: 100vh;
  padding-bottom: 60px;
}
.masthead {
  border-bottom: 2px solid var(--ink);
  padding: 24px 32px 18px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
  background: rgba(250,246,239,0.96);
}
.masthead-inner {
  max-width: 1500px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.brand h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 36px;
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--ink);
}
.brand h1 em {
  font-style: italic;
  color: var(--accent);
  font-weight: 500;
}
.brand .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-top: 8px;
  font-weight: 500;
}
.tools {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 9px 15px;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.12s ease;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.btn:hover { background: var(--paper-warm); border-color: var(--ink); }
.btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }
.btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.btn.danger { color: var(--red); border-color: var(--red); }
.btn.danger:hover { background: var(--red); color: var(--paper); }
.btn.tiny { padding: 4px 10px; font-size: 12px; }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--paper-warm); border-color: var(--rule); }
nav.tabs {
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  padding: 0 32px;
  position: sticky;
  top: 96px;
  z-index: 40;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs-inner {
  max-width: 1500px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}
.tab {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 500;
  padding: 14px 20px;
  cursor: pointer;
  color: var(--ink-soft);
  border-bottom: 2px solid transparent;
  transition: all 0.12s ease;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-style: italic;
  flex-shrink: 0;
}
.tab:hover { color: var(--ink); background: var(--paper-deep); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-style: normal;
  font-weight: 600;
}
.tab .count {
  display: inline-block;
  background: var(--rule-soft);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 6px;
  margin-left: 6px;
  border-radius: 8px;
  vertical-align: 2px;
  font-weight: 600;
  font-style: normal;
}
.tab.active .count { background: var(--accent); color: var(--paper); }
main {
  max-width: 1500px;
  margin: 0 auto;
  padding: 28px 32px;
}
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap;
  gap: 16px;
}
.section-head h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1;
}
.section-head .desc {
  font-size: 14px;
  color: var(--ink-mid);
  font-style: italic;
  margin-top: 6px;
  max-width: 70ch;
}
.section-head .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.panel {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 3px;
  padding: 22px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}
.panel h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  color: var(--ink);
  flex-wrap: wrap;
}
.panel h3 .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
}
.panel h3 .actions { display: flex; gap: 6px; align-items: center; }
.panel h4 {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  color: var(--ink-soft);
  margin: 18px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule-soft);
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
@media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .masthead { padding: 16px 18px; }
  nav.tabs { padding: 0 16px; top: 86px; }
  main { padding: 22px 18px; }
  .brand h1 { font-size: 28px; }
  .section-head h2 { font-size: 28px; }
  .panel { padding: 18px; }
}

/* ====== MOBILE-FIRST RESPONSIVE — comprehensive phone view ====== */
@media (max-width: 640px) {
  body { font-size: 14px; }
  .masthead { padding: 14px 14px 10px; position: relative; top: auto; }
  .masthead-inner { gap: 12px; align-items: stretch; }
  .brand h1 { font-size: 24px; line-height: 1.1; }
  .brand .sub { font-size: 11px; }
  .tools {
    display: flex; flex-wrap: wrap; gap: 8px;
    width: 100%; justify-content: flex-start;
  }
  .tools .btn {
    padding: 8px 12px; font-size: 12px;
    flex: 1 1 auto; min-width: max-content;
  }
  .sync-status {
    padding: 6px 10px; font-size: 10px;
    flex: 1 1 100%; text-align: center; margin: 0 0 4px;
  }
  nav.tabs { top: 0; padding: 0; }
  .tabs-inner { padding: 0 8px; }
  .tab { font-size: 14px; padding: 10px 12px; }
  main { padding: 12px 10px 24px; }
  .panel { padding: 14px; margin-bottom: 14px; }
  .panel h3 { font-size: 16px; }
  h2, .section-head h2 { font-size: 22px; }
  h4 { font-size: 13px; margin: 16px 0 8px; }
  .desc { font-size: 13px; }
  .section-head { flex-direction: column; align-items: stretch; gap: 10px; }
  .section-head .actions { width: 100%; flex-wrap: wrap; }
  .section-head .actions .btn { flex: 1 1 auto; }
  .stat { padding: 12px 14px; }
  .stat .value { font-size: 22px; }
  .stat .label { font-size: 10px; }
  .stat .sub { font-size: 11px; }
  /* Tables — keep horizontal scroll, but make rows tappable */
  table { font-size: 12px; }
  table th, table td { padding: 8px 6px; }
  /* Inline-edit fields easier to tap */
  .editable { min-height: 32px; padding: 4px 6px; }
  input, select, textarea { font-size: 16px; } /* prevents iOS auto-zoom on focus */
  .btn { min-height: 38px; padding: 8px 14px; }
  .btn.tiny { min-height: 30px; padding: 4px 10px; font-size: 11px; }
  /* Spending summary stays 2-col on phone */
  .spending-summary { grid-template-columns: 1fr 1fr; gap: 8px; }
  .spending-summary > div { padding: 6px; }
  .spending-summary .lbl { font-size: 9px; }
  .spending-summary .val { font-size: 14px; }
  /* Earnings/Spending day-grid: stack vertically with day labels on each row */
  .day-grid {
    grid-template-columns: 1fr;
    gap: 1px;
    background: var(--rule-soft);
  }
  .day-grid .head { display: none; }
  .day-grid > div[data-day] {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    text-align: left;
    background: var(--paper);
  }
  .day-grid > div[data-day]::before {
    content: attr(data-day);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 600;
    width: 50px;
    flex-shrink: 0;
  }
  .day-grid > div[data-day] input.editable {
    text-align: right;
    width: auto;
    flex: 1;
    font-size: 15px;
    padding: 6px 8px;
  }
  .day-grid .total-cell {
    background: var(--paper-deep) !important;
    font-size: 16px;
    padding: 12px;
  }
  .day-grid .total-cell::before {
    color: var(--ink) !important;
    font-weight: 700;
  }
  /* Leftover grid stacks fully */
  .leftover-grid {
    grid-template-columns: 1fr;
    gap: 6px;
    text-align: center;
  }
  .leftover-grid > div { padding: 8px 0; }
  .leftover-grid .lo-op { font-size: 18px; padding: 0; }
  .leftover-grid .lo-value { font-size: 18px; }
  .leftover-grid .lo-result { padding: 12px; }
  /* Wedding expense cards: 1 col on phone */
  .wedding-expense-grid { grid-template-columns: 1fr; gap: 10px; }
  .wexp-card { padding: 12px 14px; }
  .wexp-label { font-size: 16px; }
  .wexp-cost { font-size: 15px; }
  .wexp-actions { opacity: 1; position: static; margin-top: 8px; justify-content: flex-end; }
  /* Timeline color legend stacks */
  .timeline-legend-grid { grid-template-columns: 1fr; }
  /* Modal */
  .modal { max-width: calc(100vw - 24px); padding: 16px; }
  /* Notes blocks */
  .note-block { font-size: 11px; padding: 6px 8px; }
  /* Pill selects */
  .editable.pill { padding: 4px 8px; font-size: 11px; }
  /* Foot note */
  .foot-note { padding: 14px; font-size: 11px; }
  /* Sign-in card */
  .passcode-card { padding: 28px 22px; max-width: calc(100vw - 32px); }
  .passcode-brand h1 { font-size: 26px; }
  .passcode-card input { font-size: 16px; }
}

/* Extra-tight squeeze on small phones */
@media (max-width: 380px) {
  .brand h1 { font-size: 21px; }
  .stat .value { font-size: 19px; }
  .tab { font-size: 13px; padding: 9px 9px; }
  table th, table td { padding: 6px 4px; }
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th, td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: middle;
}
th {
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--ink-soft);
  background: var(--paper-warm);
  border-bottom: 2px solid var(--ink);
  white-space: nowrap;
}
tr:hover td { background: rgba(240,232,214,0.45); }
tr.total-row td { background: var(--paper-warm) !important; font-weight: 700; border-top: 2px solid var(--ink); }
tr.paid-row td { color: var(--ink-soft); text-decoration: line-through; text-decoration-color: rgba(120, 100, 70, 0.5); }
tr.paid-row td .editable { color: var(--ink-soft); }

td.computed-cell {
  background: rgba(180, 215, 145, 0.12);
  font-style: italic;
  color: var(--ink);
  position: relative;
}
td.computed-cell::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 50%;
  width: 4px;
  height: 4px;
  background: rgba(120, 168, 104, 0.6);
  border-radius: 50%;
  transform: translateY(-50%);
}

/* Wedding Expenses — card-based layout */
.wedding-expenses-panel { background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%); }
.wedding-expense-summary { padding: 0 0 16px; }
.wexp-progress {
  height: 8px;
  background: var(--rule-soft);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 6px;
}
.wexp-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #80a868 0%, #b8d8a4 100%);
  transition: width 0.3s ease;
}
.wexp-progress-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-soft);
}
.wexp-progress-labels strong {
  color: var(--ink);
  font-weight: 700;
}

.wedding-expense-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

.wexp-card {
  position: relative;
  padding: 14px 16px;
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-left: 4px solid var(--ink);
  border-radius: 2px;
  transition: all 0.2s ease;
}
.wexp-card:hover {
  border-left-color: #80a868;
  box-shadow: 0 2px 8px rgba(60, 50, 30, 0.08);
}
.wexp-card.wexp-paid {
  background: rgba(180, 215, 145, 0.08);
  border-left-color: #80a868;
  opacity: 0.85;
}

.wexp-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 4px;
}
.wexp-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
  line-height: 1.3;
}
.wexp-card.wexp-paid .wexp-label .editable { color: var(--ink-soft); text-decoration: line-through; text-decoration-color: rgba(120, 168, 104, 0.6); }
.wexp-cost-area {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.wexp-cost {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
}
.wexp-cost.paid { color: var(--ink-soft); }

.wexp-paid-toggle {
  cursor: pointer;
  user-select: none;
}
.wexp-paid-toggle input[type=checkbox] { display: none; }
.wexp-paid-pill {
  display: inline-block;
  padding: 2px 9px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: 1px solid var(--ink-soft);
  border-radius: 10px;
  color: var(--ink-soft);
  background: transparent;
  transition: all 0.15s ease;
}
.wexp-paid-toggle:hover .wexp-paid-pill {
  background: var(--paper-warm);
  color: var(--ink);
}
.wexp-paid-toggle input[type=checkbox]:checked + .wexp-paid-pill {
  background: #b8d8a4;
  color: #2d4520;
  border-color: #80a868;
  font-weight: 600;
}

.wexp-note {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--paper-warm);
  border-left: 2px solid var(--rule-soft);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
  border-radius: 0 2px 2px 0;
  white-space: pre-wrap;
}

.wexp-subitems {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed var(--rule-soft);
  font-family: 'Inter', sans-serif;
}
.wexp-subitem {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 8px;
  align-items: center;
  padding: 4px 0;
  font-size: 13px;
}
.wexp-subitem.wexp-paid .wexp-sub-label .editable { text-decoration: line-through; color: var(--ink-soft); }
.wexp-sub-label { color: var(--ink-soft); font-style: italic; }
.wexp-sub-cost { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--ink); }
.wexp-sub-paid-toggle { display: flex; align-items: center; }
.wexp-sub-paid-toggle input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
.wexp-subnote {
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: var(--ink-soft); font-style: italic;
  padding: 2px 0 4px 14px;
  white-space: pre-wrap;
}
.wexp-subtotal {
  margin-top: 6px;
  text-align: right;
  font-size: 11px;
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-style: italic;
  padding-top: 4px;
  border-top: 1px solid var(--rule-soft);
}
.wexp-subtotal strong { color: var(--ink); font-style: normal; }

.wexp-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.wexp-card:hover .wexp-actions { opacity: 1; }
.wexp-actions .btn { padding: 2px 7px; font-size: 11px; }

/* Timeline color-coding — editable colors via inline-style backgrounds */
.timeline-legend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  padding: 6px 0;
}
.tl-color-row {
  display: grid;
  grid-template-columns: 18px 1fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 6px 8px;
  background: var(--paper-warm);
  border: 1px solid var(--rule-soft);
  border-radius: 2px;
}
.tl-color-row .tl-color-label {
  background: transparent; border: 1px solid transparent;
  font-family: 'Inter', sans-serif; font-size: 13px;
  padding: 2px 4px; color: var(--ink); width: 100%;
}
.tl-color-row .tl-color-label:hover, .tl-color-row .tl-color-label:focus {
  border-color: var(--rule-soft);
  outline: none; background: var(--paper);
}
.tl-color-row .tl-color-picker {
  width: 36px; height: 28px; border: 1px solid var(--rule-soft); cursor: pointer;
  background: transparent; border-radius: 2px; padding: 1px;
}
.tl-pill {
  display: inline-block; width: 14px; height: 14px;
  border: 1px solid var(--ink-soft); border-radius: 2px;
}

table.timeline-table tr.note-row td { background: var(--paper-warm) !important; padding: 4px 12px 8px; }
table.timeline-table tr.extras-row td { padding: 4px 12px 8px; }

.tl-badge {
  display: inline-block; margin-left: 8px; padding: 1px 7px; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em;
  border-radius: 8px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  vertical-align: middle;
}

td.tl-cum .tl-cum-sub {
  display: block; font-size: 10px; color: var(--ink-soft);
  font-family: 'Inter', sans-serif; font-style: italic; font-weight: 400;
  margin-top: 2px; letter-spacing: 0.02em;
}

.tl-auto {
  display: inline-block;
  padding: 4px 8px;
  background: rgba(180, 215, 145, 0.25);
  border: 1px solid rgba(120, 168, 104, 0.5);
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
}
.tl-auto-val { font-size: 13px; font-weight: 600; }
.tl-auto-sub {
  font-family: 'Inter', sans-serif; font-size: 9px;
  color: var(--ink-soft); font-style: italic;
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-top: 1px;
}

.extras-block {
  padding: 4px 8px;
  background: rgba(255, 255, 255, 0.5);

'use strict';

let _signInAttempts = 0;
let _signInLockUntil = 0;
let _currentUser = null;

function submitSignIn(e) {
  e.preventDefault();
  const now = Date.now();
  const errEl = document.getElementById('signInError');
  if (now < _signInLockUntil) {
    const secs = Math.ceil((_signInLockUntil - now) / 1000);
    errEl.textContent = `Too many failed attempts — try again in ${secs}s.`;
    return false;
  }
  if (!window.__firebase) {
    errEl.textContent = 'Connecting to authentication… try again in a moment.';
    return false;
  }
  const email = document.getElementById('signInEmail').value.trim();
  const password = document.getElementById('signInPassword').value;
  if (!email || !password) {
    errEl.textContent = 'Email and password required.';
    return false;
  }
  errEl.textContent = 'Signing in…';
  const submitBtn = document.querySelector('#signInForm button[type=submit]');
  submitBtn.disabled = true;
  window.__firebase.signInWithEmailAndPassword(email, password)
    .then((cred) => {
      _currentUser = cred.user;
      _signInAttempts = 0;
      document.getElementById('signInGate').classList.add('hidden');
      bootApp();
    })
    .catch((err) => {
      _signInAttempts++;
      submitBtn.disabled = false;
      document.getElementById('signInPassword').value = '';
      let msg = 'Sign-in failed.';
      const code = err && err.code;
      if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found' || code === 'auth/invalid-email') {
        msg = 'Incorrect email or password.';
      } else if (code === 'auth/network-request-failed') {
        msg = 'No internet connection.';
      } else if (code === 'auth/too-many-requests') {
        msg = 'Too many failed attempts — Firebase has temporarily locked this account. Try again in a few minutes.';
      } else if (err && err.message) {
        msg = err.message;

        _signInLockUntil = Date.now() + 60000;
        _signInAttempts = 0;
        errEl.textContent = 'Too many failed attempts — try again in 60 seconds.';
      } else {
        errEl.textContent = msg;
      }
    });
  return false;
}

function signOutAndLock() {

  if (window.__firebase) {

// =================================================================
// SYNC STATE (set up before db is loaded)
// =================================================================
let _syncState = 'pending'; // 'pending' | 'synced' | 'syncing' | 'offline' | 'local'
let _firestoreReady = false;
let _suppressNextLocalWrite = false; // when applying remote update, skip pushing back
let _unsubFirestore = null;
let _fsPushTimer = null;
let _lastRemoteAt = 0;

function setSyncStatus(state, label) {
  _syncState = state;
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync-status sync-' + state;
  const labels = {
    pending: '● Loading…',
    synced: '● Synced',
    syncing: '● Syncing…',
    offline: '● Offline',
    local: '● Local only',
  };
  el.textContent = label || labels[state] || state;
}

window.addEventListener('online', () => {
  if (_firestoreReady) setSyncStatus('synced');
});
window.addEventListener('offline', () => {
  setSyncStatus('offline');
});

function pushToFirestore() {
  // Debounced push of the whole db blob to Firestore
  if (!_firestoreReady || !window.__firebase) return;
  if (_suppressNextLocalWrite) {
    _suppressNextLocalWrite = false;
    return;
  }
  clearTimeout(_fsPushTimer);
  setSyncStatus('syncing');
  _fsPushTimer = setTimeout(async () => {
    try {
      const fb = window.__firebase;
      const payload = {
        data: db,
        updated_at: fb.serverTimestamp(),
        client_updated_at: Date.now(),
      };
      await fb.setDoc(fb.docRef(), payload, { merge: false });
      setSyncStatus(navigator.onLine ? 'synced' : 'offline');
    } catch (err) {
      console.error('Firestore push failed:', err);
      setSyncStatus('offline');
    }
  }, 1500);
}

async function initFirebaseSync() {
  if (!window.__firebase) {
    setSyncStatus('local', '● Local only');
    return;
  }
  const fb = window.__firebase;
  setSyncStatus('pending', '● Connecting…');
  // User should already be signed in by this point (sign-in happened in submitSignIn or via persistence)
  if (!_currentUser && fb.auth.currentUser) {
    _currentUser = fb.auth.currentUser;
  }
  if (!_currentUser) {
    setSyncStatus('local', '● Not signed in');
    return;
  }
  // Listen for remote changes
  _unsubFirestore = fb.onSnapshot(fb.docRef(), (snap) => {
    if (!snap.exists()) {
      // First-ever run: push local db up so Firestore has a starting point
      _firestoreReady = true;
      pushToFirestore();
      return;
    }
    const remote = snap.data();
    const remoteClientAt = remote.client_updated_at || 0;
    // If remote is newer than our last known, apply it
    if (remoteClientAt > _lastRemoteAt && remote.data) {
      _lastRemoteAt = remoteClientAt;
      // Only apply if this update wasn't from us within the last second
      const elapsed = Date.now() - remoteClientAt;
      if (elapsed > 800) { // give our own write time to round-trip without flicker
        _suppressNextLocalWrite = true;
        db = remote.data;
        // Re-ensure structural defaults (in case remote was older shape)
        ensureDbDefaults();
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){}
        if (typeof render === 'function') {
          buildTabs();
          render();
        }
        toast('Synced changes from another device');
      }
    }
    _firestoreReady = true;
    setSyncStatus('synced');
  }, (err) => {
    console.error('Firestore listener error:', err);
    setSyncStatus('offline');
  });
}

function ensureDbDefaults() {
  // Same logic as loadDB but applied to whatever's in `db` now
  for (const k of Object.keys(SEED)) if (!(k in db)) db[k] = SEED[k];
  if (!Array.isArray(db.notes)) db.notes = [];
  if (!db.fixed_spending_overrides || typeof db.fixed_spending_overrides !== 'object') {
    db.fixed_spending_overrides = {};
  }
}

// =================================================================
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const fmt$ = (v) => {
  if (v === null || v === undefined || v === '' || isNaN(Number(v))) return '—';
  const n = Number(v);
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmt$0 = (v) => {
  if (v === null || v === undefined || v === '' || isNaN(Number(v))) return '—';
  const n = Number(v);
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
};
const sumNonNull = (arr) => arr.reduce((a,b) => a + (Number(b) || 0), 0);
const escHTML = (s) => {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
};
const escAttr = (s) => escHTML(s);
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = kind === 'error' ? 'var(--red)' : 'var(--ink)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function todayISO() { return new Date().toISOString().slice(0,10); }

// Compute week total from days object
function weekTotal(week) {
  if (!week || !week.days) return 0;
  return DAYS.reduce((s, d) => s + (Number(week.days[d]) || 0), 0);
}

// Compute monthly earnings totals from weeks (auto-sync)
function computeMonthEarnings(year, month) {
  const wKey = `earnings_${year}_weeks`;
  const weeks = db[wKey] || [];
  return weeks.filter(w => w.month === month).reduce((s, w) => s + weekTotal(w), 0);
}
function computeMonthDailySpending(year, month) {
  const wKey = `spending_${year}_weeks`;
  const weeks = db[wKey] || [];
  return weeks.filter(w => w.month === month).reduce((s, w) => s + weekTotal(w), 0);
}

// Fixed spending for a month: returns { items: [...], total: number }
function getFixedSpending(year, month) {
  const key = `${year}-${month}`;
  if (db.fixed_spending_overrides && db.fixed_spending_overrides[key]) {
    const items = db.fixed_spending_overrides[key];
    return { items, total: items.reduce((s, x) => s + (Number(x.amount) || 0), 0) };
  }
  // Use template
  return {
    items: db.fixed_spending_template,
    total: db.fixed_spending_template.reduce((s, x) => s + (Number(x.amount) || 0), 0)
  };
}

// Gifts for a month: search gift_blocks for purchases dated in this month
function getMonthlyGifts(year, month) {
  const monthIdx = MONTHS.indexOf(month);
  const items = [];
  for (const block of db.gift_blocks || []) {
    for (const p of block.people || []) {
      if (p.actual && p.date_purchased) {
        const d = new Date(p.date_purchased);
        if (!isNaN(d) && d.getFullYear() === year && d.getMonth() === monthIdx) {
          items.push({
            name: p.name,
            amount: p.actual,
            occasion: block.occasion,
            gift: p.gift,
            date: p.date_purchased,
          });
        }
      }
    }
  }
  return { items, total: items.reduce((s, x) => s + (Number(x.amount) || 0), 0) };
}

// Composite monthly spending total
function totalMonthSpending(year, month) {
  return computeMonthDailySpending(year, month)
       + getFixedSpending(year, month).total
       + getMonthlyGifts(year, month).total;
}

// Group weeks by year then month, sorted newest first
function groupWeeksByMonth(weeks) {
  const byYear = {};
  for (const w of weeks) {
    const y = w.year;
    const m = w.month;
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][m]) byYear[y][m] = [];
    byYear[y][m].push(w);
  }
  return byYear;
}

function sortMonthsDesc(monthsArr) {
  return monthsArr.slice().sort((a,b) => MONTHS.indexOf(b) - MONTHS.indexOf(a));
}

// Numeric parse helpers
function numOrNull(v) {
  if (v === '' || v === null || v === undefined) return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

// Renders an editable numeric span with onblur saving via the global store-by-path system
// path: dot-separated path into db, like "earnings_2026_weeks.0.days.Monday"
function inlineNum(path, value, opts) {
  opts = opts || {};
  const isEmpty = value === null || value === undefined || value === '';
  return `<input type="text" class="editable" data-path="${escAttr(path)}" data-type="num" 
    data-empty="${isEmpty}" 
    value="${isEmpty ? '' : escHTML(value)}" 
    placeholder="${opts.placeholder || '—'}"
    onblur="commitInline(this)"
    onkeydown="if(event.key==='Enter') this.blur()"
  />`;
}
function inlineText(path, value, opts) {
  opts = opts || {};
  const isEmpty = value === null || value === undefined || value === '';
  return `<input type="text" class="editable text" data-path="${escAttr(path)}" data-type="text" 
    data-empty="${isEmpty}" 
    value="${isEmpty ? '' : escAttr(value)}" 
    placeholder="${opts.placeholder || ''}"
    onblur="commitInline(this)"
    onkeydown="if(event.key==='Enter') this.blur()"
  />`;
}
function commitInline(el) {
  const path = el.dataset.path;
  const type = el.dataset.type;
  let val = el.value.trim();
  if (val === '') {
    val = null;
  } else if (type === 'num') {
    const n = Number(val);
    if (isNaN(n)) {
      toast('Invalid number', 'error');
      el.focus();
      return;
    }
    val = n;
  }
  setByPath(db, path, val);
  saveDB();
  // Recompute relevant totals on the fly (lightweight: re-render current tab)
  // Use a debounced full re-render so totals update automatically
  scheduleRender();
}
function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const key = parts[i];
    if (cur[key] === undefined || cur[key] === null) cur[key] = isNaN(parts[i+1]) ? {} : [];
    cur = cur[key];
  }
  cur[parts[parts.length - 1]] = value;
}
function getByPath(obj, path) {
  const parts = path.split('.');
  let cur = obj;
  for (const p of parts) {
    if (cur === null || cur === undefined) return undefined;
    cur = cur[p];
  }
  return cur;
}

let _renderTimer = null;
function scheduleRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => {
    // Capture focus to restore after re-render
    const active = document.activeElement;
    const wasInput = active && active.classList.contains('editable');
    const path = wasInput ? active.dataset.path : null;
    const cursor = wasInput ? active.selectionStart : null;
    render();
    if (path) {
      const restored = document.querySelector(`[data-path="${path}"]`);
      if (restored) {
        restored.focus();
        if (cursor !== null && restored.setSelectionRange) {
          try { restored.setSelectionRange(cursor, cursor); } catch (e) {}
        }
      }
    }
  }, 350);
}

// =================================================================
// EARNINGS — collapsible newest first, inline daily editing
// =================================================================
function renderTimeData(kind) {
  const isE = kind === 'earnings';
  const title = isE ? 'Earnings' : 'Spending';
  const all = (db[`${kind}_2026_weeks`] || []).concat(db[`${kind}_2025_weeks`] || []);
  const grouped = groupWeeksByMonth(all);
  const years = Object.keys(grouped).map(Number).sort((a,b) => b - a);

  // Hide-future state (persisted)
  if (typeof db.ui_hide_future !== 'object' || db.ui_hide_future === null) {
    db.ui_hide_future = { earnings: true, spending: true };
  }
  const hideFuture = !!db.ui_hide_future[kind];

  // Determine current month — anything strictly after this is "future"
  const now = new Date();
  const currentYM = now.getFullYear() * 100 + now.getMonth(); // e.g. 2026 * 100 + 4 (May = 4)

  const isFutureMonth = (year, monthName) => {
    const monthIdx = MONTHS.indexOf(monthName);
    if (monthIdx < 0) return false;
    return (Number(year) * 100 + monthIdx) > currentYM;
  };

  // Compute totals across all
  const grandTotal = all.reduce((s,w) => s + weekTotal(w), 0);
  const totals26 = (db[`${kind}_2026_weeks`]||[]).reduce((s,w)=>s+weekTotal(w),0);
  const totals25 = (db[`${kind}_2025_weeks`]||[]).reduce((s,w)=>s+weekTotal(w),0);
  const ytd2026Weeks = (db[`${kind}_2026_weeks`]||[]).filter(w => !isFutureMonth(2026, w.month));
  const ytd2026 = ytd2026Weeks.reduce((s,w)=>s+weekTotal(w),0);
  const avgWeekYTD = ytd2026Weeks.length ? ytd2026 / ytd2026Weeks.length : 0;

  let html = `
    <div class="section-head">
      <div>
        <h2>${title}</h2>
        <div class="desc">${isE ? 'Daily earnings, week by week — totals roll up automatically into months and years.' : 'Daily spending grid. Monthly total combines daily entries with fixed costs and gift purchases.'}</div>
      </div>
      <div class="actions">
        <label class="checkbox-row" style="font-size:13px; padding: 6px 10px; background: var(--paper-warm); border: 1px solid var(--rule-soft); border-radius: 2px;">
          <input type="checkbox" ${hideFuture ? 'checked' : ''} onchange="toggleHideFuture('${kind}', this.checked)">
          Hide future months
        </label>
        <button class="btn primary" onclick="addWeek('${kind}')">+ New Week</button>
      </div>
    </div>

    <div class="grid-4">
      <div class="stat"><div class="label">2026 YTD</div><div class="value ${isE?'pos':'neg'}">${fmt$0(ytd2026)}</div><div class="sub">${ytd2026Weeks.length} weeks through ${MONTHS[now.getMonth()]}</div></div>
      <div class="stat"><div class="label">2026 Total (incl. future)</div><div class="value">${fmt$0(totals26)}</div><div class="sub">${(db[`${kind}_2026_weeks`]||[]).length} weeks logged</div></div>
      <div class="stat"><div class="label">2025 Total</div><div class="value">${fmt$0(totals25)}</div><div class="sub">${(db[`${kind}_2025_weeks`]||[]).length} weeks logged</div></div>
      <div class="stat"><div class="label">Avg per Week (YTD)</div><div class="value">${fmt$0(avgWeekYTD)}</div><div class="sub">2026 only</div></div>
    </div>
  `;

  if (years.length === 0) {
    html += `<div class="empty panel">No weeks yet — add one to get started.</div>`;
    return html;
  }

  for (const year of years) {
    const allMonths = sortMonthsDesc(Object.keys(grouped[year]));
    const visibleMonths = hideFuture ? allMonths.filter(m => !isFutureMonth(year, m)) : allMonths;
    if (visibleMonths.length === 0) continue;
    const yearTotalAll = allMonths.reduce((s, m) => s + grouped[year][m].reduce((s2,w) => s2 + weekTotal(w), 0), 0);
    const yearTotalVisible = visibleMonths.reduce((s, m) => s + grouped[year][m].reduce((s2,w) => s2 + weekTotal(w), 0), 0);
    const hiddenCount = allMonths.length - visibleMonths.length;
    html += `
      <details class="collapsible year-group" open>
        <summary>
          <span class="summary-title"><em>${year}</em></span>
          <span class="summary-meta">
            <span><strong>${fmt$0(yearTotalVisible)}</strong>${hiddenCount > 0 ? ` · ${hiddenCount} future month${hiddenCount!==1?'s':''} hidden` : ''}</span>
          </span>
        </summary>
        <div class="body">`;
    // Open the most recent NON-future month by default
    const newestNonFuture = visibleMonths[0];
    for (const month of visibleMonths) {
      const weeks = grouped[year][month].slice().sort((a,b) => parseWeekStart(b.label) - parseWeekStart(a.label));

                <button class="btn tiny danger" onclick="deleteWeek('${wKey}',${wIdx})">×</button>
              </div>
            </div>
            <div class="day-grid">
              ${DAYS_SHORT.map(d => `<div class="head">${d}</div>`).join('')}<div class="head">Total</div>
              ${DAYS.map((d, di) => `<div data-day="${DAYS_SHORT[di]}">${inlineNum(`${wKey}.${wIdx}.days.${d}`, w.days[d])}</div>`).join('')}

      }
      html += `</div></details>`;
    }
    html += `</div></details>`;
  }
  return html;
}

function toggleHideFuture(kind, checked) {

    db.ui_hide_future = { earnings: true, spending: true };

  db.ui_hide_future[kind] = checked;

function parseWeekStart(label) {
  // e.g., "January 12 - January 18" or "May 05 - 11" -> approximate sortable number
  if (!label) return 0;
  const m = label.match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d+)/i);
  if (!m) return 0;
  const monthIdx = MONTHS.findIndex(x => x.toLowerCase() === m[1].toLowerCase());
  return monthIdx * 100 + Number(m[2]);
}

  const w = db[key][idx];
  const html = `
    <div class="field-row">

        <select id="ew_year">
          ${[2025,2026,2027].map(y => `<option value="${y}" ${w.year===y?'selected':''}>${y}</option>`).join('')}

      <input type="text" id="ew_label" value="${escAttr(w.label)}">
    </div>
  `;
  openModal('Edit week', html, () => {
    const newYear = Number(document.getElementById('ew_year').value);
    const newMonth = document.getElementById('ew_month').value;
    const newLabel = document.getElementById('ew_label').value.trim();

function renderBudgeting() {
  ensureBudgetingMigrated();
  const blocks = (db.budget_blocks || []).slice().sort((a,b) => sortBudgetBlock(b) - sortBudgetBlock(a));
  let html = `
    <div class="section-head">
      <div>
        <h2>Monthly Budgeting</h2>
        <div class="desc">Each snapshot mirrors the spreadsheet's layout: Savings &amp; Checking, Credit Cards (with payment and balance after payment), and joint Payments (mortgage, life insurance, and anything else recurring). Net worth auto-calculates throughout. Click any number to edit.</div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="addBudgetBlockNew()">+ New Snapshot</button>
      </div>
    </div>
  `;
  if (blocks.length === 0) {
    html += `<div class="empty panel">No snapshots yet.</div>`;
    return html;
  }
  blocks.forEach((blk, sortedIdx) => {
    const idx = db.budget_blocks.indexOf(blk);
    const calc = computeBudgetTotals(blk);
    const isOpen = sortedIdx === 0;
    html += renderBudgetBlock(blk, idx, calc, isOpen);
  });
  return html;
}

function ensureBudgetingMigrated() {
  // v3: seed data is already in new structured format. Just ensure arrays exist.
  for (const blk of (db.budget_blocks || [])) {
    if (!Array.isArray(blk.savings_lily)) blk.savings_lily = [];
    if (!Array.isArray(blk.savings_harut)) blk.savings_harut = [];
    if (!Array.isArray(blk.cards_lily)) blk.cards_lily = [];
    if (!Array.isArray(blk.cards_harut)) blk.cards_harut = [];
    if (!Array.isArray(blk.payments)) blk.payments = [];
  }
}

function computeBudgetTotals(blk) {
  const sumNum = (arr, key) => (arr || []).reduce((s,x) => s + (Number(x[key]) || 0), 0);

  const lilySav = sumNum(blk.savings_lily, 'amount');
  const harutSav = sumNum(blk.savings_harut, 'amount');
  const lilyCardsBal = sumNum(blk.cards_lily, 'balance');
  const harutCardsBal = sumNum(blk.cards_harut, 'balance');
  const lilyCardsPay = sumNum(blk.cards_lily, 'payment');
  const harutCardsPay = sumNum(blk.cards_harut, 'payment');
  // After-Payment is computed live (balance − payment) — not stored.
  const lilyCardsAfter = (blk.cards_lily || []).reduce((s,x) => s + ((Number(x.balance)||0) - (Number(x.payment)||0)), 0);
  const harutCardsAfter = (blk.cards_harut || []).reduce((s,x) => s + ((Number(x.balance)||0) - (Number(x.payment)||0)), 0);
  const paymentsTotal = sumNum(blk.payments, 'amount');

  // Net Worth = savings − cards balance (current state)
  const lilyNet = lilySav - lilyCardsBal;
  const harutNet = harutSav - harutCardsBal;
  const combinedSav = lilySav + harutSav;
  const combinedCardsBal = lilyCardsBal + harutCardsBal;
  const combinedNet = lilyNet + harutNet;

  // Combined checking — only accounts flagged as is_checking
  const lilyChecking = (blk.savings_lily || []).filter(x => x.is_checking).reduce((s,x) => s + (Number(x.amount)||0), 0);
  const harutChecking = (blk.savings_harut || []).filter(x => x.is_checking).reduce((s,x) => s + (Number(x.amount)||0), 0);
  const combinedChecking = lilyChecking + harutChecking;

  // Leftover = combined checking − payments. This is what's available to pay credit cards.
  const leftover = combinedChecking - paymentsTotal;

  // Final Leftover = Leftover − card payments (split into savings, 50/50 in spreadsheet)
  const combinedCardPayments = lilyCardsPay + harutCardsPay;
  const finalLeftover = leftover - combinedCardPayments;

  // Final Net Worth (Option 3 per user choice):
  // - Per person: equals plain Net Worth, since `(cash − card_payments) − cards_after`
  //   algebraically reduces to `cash − cards_balance` = Net Worth.
  //   (Card payments cancel: cash down by X, debt down by X.)
  // - Combined: Combined Net Worth minus joint Payments & Other Costs total.
  //   This reflects mortgage, life insurance, etc. as true net-worth reductions.
  // Per-person allocation of joint payments isn't computed automatically — that's
  // a manual call between Lily and Harut and varies snapshot to snapshot.
  const lilyFinal = lilyNet;
  const harutFinal = harutNet;
  const combinedFinal = combinedNet - paymentsTotal;

  // Combined cash after all payments are made (card payments + Payments & Other Costs)
  // come out of the cash pool.
  const combinedCashAfter = (lilySav + harutSav) - combinedCardPayments - paymentsTotal;

  return {
    lilySav, harutSav, lilyCardsBal, harutCardsBal,
    lilyCardsPay, harutCardsPay, lilyCardsAfter, harutCardsAfter,
    paymentsTotal,
    lilyNet, harutNet, combinedNet,
    lilyChecking, harutChecking, combinedChecking,
    combinedCardPayments, combinedCashAfter,
    leftover, finalLeftover,
    lilyFinal, harutFinal, combinedFinal,
  };
}

function sortBudgetBlock(blk) {
  const d = blk.date || '';
  const yMatch = d.match(/(20\d{2})/);
  if (!yMatch) return 0;
  const year = Number(yMatch[1]);
  const monthMatch = d.match(/(January|February|March|April|May|June|July|August|September|October|November|December|Feburary)/i);
  let monthIdx = 0;
  if (monthMatch) {
    const mn = monthMatch[1];
    if (/feburary|february/i.test(mn)) monthIdx = 1;
    else monthIdx = MONTHS.findIndex(m => m.toLowerCase() === mn.toLowerCase());
    if (monthIdx < 0) monthIdx = 0;
  }
  const dayMatch = d.match(/(\d+)(st|nd|rd|th)?,?\s*20\d{2}/);
  const day = dayMatch ? Number(dayMatch[1]) : 1;
  return year * 10000 + monthIdx * 100 + day;
}

function addBudgetBlockNew() {
  const today = new Date();
  const defaultTitle = `${MONTHS[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;
  const html = `
    <div class="field"><label>Snapshot title</label>
      <input type="text" id="nb_t" value="${defaultTitle}">
    </div>
    <p style="font-size:12px;color:var(--ink-soft);">A new snapshot copies the structure (account names, card names, payment items) from your most recent snapshot, with all values reset to blank for you to fill in.</p>
  `;
  openModal('New monthly snapshot', html, () => {
    const title = document.getElementById('nb_t').value.trim();
    if (!title) { alert('Title required'); return false; }
    const recent = db.budget_blocks.slice().sort((a,b) => sortBudgetBlock(b) - sortBudgetBlock(a))[0];
    const cloneSav = (arr) => (arr || []).map(it => ({ id: 'sav_' + uid(), name: it.name, amount: null, is_checking: !!it.is_checking, note: null }));
    const cloneCards = (arr) => (arr || []).map(it => ({ id: 'crd_' + uid(), name: it.name, balance: null, payment: null, note: null }));
    const clonePay = (arr) => (arr || []).map(it => ({ id: 'pay_' + uid(), name: it.name, amount: null, note: null }));
    db.budget_blocks.push({
      id: 'blk_' + uid(),
      date: title,
      savings_lily: recent ? cloneSav(recent.savings_lily) : [],
      savings_harut: recent ? cloneSav(recent.savings_harut) : [],
      cards_lily: recent ? cloneCards(recent.cards_lily) : [],
      cards_harut: recent ? cloneCards(recent.cards_harut) : [],
      payments: recent ? clonePay(recent.payments) : [],
      note: null,
    });
    saveDBNow(); render(); toast('Snapshot added');
  });
}

function renderWedding() {
  const lily = db.wedding_lily_guests || [];
  const harut = db.wedding_harut_guests || [];
  const expenses = db.wedding_expenses || [];
  const stats = (list) => ({
    invited: list.reduce((a,g) => a + (Number(g.invited)||0), 0),
    expected: list.reduce((a,g) => a + (Number(g.expected)||0), 0),
    rsvpd: list.reduce((a,g) => a + (Number(g.rsvpd)||0), 0),
  });
  const sL = stats(lily), sH = stats(harut);
  const totalCost = expenses.reduce((s,e) => s + (Number(e.cost)||0), 0);
  const paidCost = expenses.filter(e => e.paid).reduce((s,e) => s + (Number(e.cost)||0), 0);
  return `
    <div class="section-head">
      <div>
        <h2>Wedding</h2>
        <div class="desc">Guest list, RSVP tracking, and the projected expense breakdown. Click any number to edit.</div>
      </div>
    </div>
    <div class="grid-4">
      <div class="stat"><div class="label">Lily — Invited</div><div class="value">${sL.invited}</div><div class="sub">Exp ${sL.expected} · RSVP ${sL.rsvpd}</div></div>
      <div class="stat"><div class="label">Harut — Invited</div><div class="value">${sH.invited}</div><div class="sub">Exp ${sH.expected} · RSVP ${sH.rsvpd}</div></div>
      <div class="stat"><div class="label">Combined Expected</div><div class="value">${sL.expected + sH.expected}</div><div class="sub">RSVP'd ${sL.rsvpd + sH.rsvpd}</div></div>
      <div class="stat"><div class="label">Projected Cost</div><div class="value">${fmt$0(totalCost)}</div><div class="sub">${fmt$0(paidCost)} paid · ${fmt$0(totalCost - paidCost)} remaining</div></div>
    </div>

    <div class="panel wedding-expenses-panel">
      <h3>Wedding Expenses · Projected Costs <span class="meta"><strong>${fmt$0(totalCost)}</strong> total · <strong>${fmt$0(paidCost)}</strong> paid · <button class="btn tiny" onclick="addWeddingExpense()">+ Add</button></span></h3>
      <div class="wedding-expense-summary">
        <div class="wexp-progress">
          <div class="wexp-progress-fill" style="width: ${totalCost > 0 ? Math.min(100, (paidCost / totalCost) * 100) : 0}%"></div>
        </div>
        <div class="wexp-progress-labels">
          <span><strong>${fmt$0(paidCost)}</strong> paid</span>
          <span><strong>${fmt$0(totalCost - paidCost)}</strong> remaining</span>
        </div>
      </div>
      <div class="wedding-expense-grid">
        ${expenses.map((e, i) => {
          const isParent = !e.indent;
          // Find sub-items that belong to this parent (subsequent items with indent: true)
          const subItems = [];
          if (isParent) {
            for (let j = i + 1; j < expenses.length; j++) {
              if (!expenses[j].indent) break;
              subItems.push({ item: expenses[j], idx: j });
            }
          }
          if (!isParent) return ''; // sub-items rendered with their parent below
          const parentSubsum = subItems.reduce((s, x) => s + (Number(x.item.cost) || 0), 0);
          const parentTotal = (Number(e.cost) || 0) + parentSubsum;
          return `
            <div class="wexp-card ${e.paid ? 'wexp-paid' : ''}" data-idx="${i}">
              <div class="wexp-head">
                <div class="wexp-label">${inlineText(`wedding_expenses.${i}.label`, e.label)}</div>
                <div class="wexp-cost-area">
                  <div class="wexp-cost ${e.paid ? 'paid' : ''}">${inlineNum(`wedding_expenses.${i}.cost`, e.cost)}</div>
                  <label class="wexp-paid-toggle" title="Mark as paid">
                    <input type="checkbox" ${e.paid ? 'checked' : ''} onchange="setBoolField('wedding_expenses.${i}.paid', this.checked)">
                    <span class="wexp-paid-pill">${e.paid ? '✓ Paid' : 'Mark paid'}</span>
                  </label>
                </div>
              </div>
              ${e.note ? `<div class="wexp-note">${escHTML(e.note)}</div>` : ''}
              ${subItems.length > 0 ? `
                <div class="wexp-subitems">
                  ${subItems.map(({ item: s, idx: si }) => `
                    <div class="wexp-subitem ${s.paid ? 'wexp-paid' : ''}">
                      <span class="wexp-sub-label">└ ${inlineText(`wedding_expenses.${si}.label`, s.label)}</span>
                      <span class="wexp-sub-cost">${inlineNum(`wedding_expenses.${si}.cost`, s.cost)}</span>
                      <label class="wexp-sub-paid-toggle">
                        <input type="checkbox" ${s.paid ? 'checked' : ''} onchange="setBoolField('wedding_expenses.${si}.paid', this.checked)">
                      </label>
                      <button class="btn tiny danger" onclick="deleteFromList('wedding_expenses',${si})" title="Remove">×</button>
                    </div>
                    ${s.note ? `<div class="wexp-subnote">${escHTML(s.note)}</div>` : ''}
                  `).join('')}
                  ${parentSubsum > 0 ? `<div class="wexp-subtotal">Subtotal incl. above: <strong>${fmt$0(parentTotal)}</strong></div>` : ''}
                </div>
              ` : ''}
              <div class="wexp-actions">
                ${noteIcon(`wedding_expenses.${i}`)}
                <button class="btn tiny danger" onclick="deleteFromList('wedding_expenses',${i})">×</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3>Lily's Family <span class="meta"><button class="btn tiny" onclick="addGuest('lily')">+ Add</button></span></h3>
        ${guestTable(lily, 'wedding_lily_guests')}
      </div>
      <div class="panel">
        <h3>Harut's Family <span class="meta"><button class="btn tiny" onclick="addGuest('harut')">+ Add</button></span></h3>
        ${guestTable(harut, 'wedding_harut_guests')}
      </div>
    </div>
  `;
}

// GIFTS — with date_purchased so they can flow into monthly spending
// =================================================================
function renderGifts() {
  const blocks = (db.gift_blocks || []).slice().sort((a,b) => Number(b.year || 0) - Number(a.year || 0));
  const ideas = db.gift_ideas || [];
  // group by year
  const byYear = {};
  for (const b of blocks) {
    const y = b.year || 'Unknown';
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(b);
  }
  const years = Object.keys(byYear).sort((a,b) => Number(b) - Number(a));
  let html = `
    <div class="section-head">
      <div>
        <h2>Gifts</h2>
        <div class="desc">By year and occasion. Adding a date to a gift purchase auto-syncs it into that month's spending total. Click any field to edit.</div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="addGiftOccasion()">+ New Occasion</button>
      </div>
    </div>
  `;
  for (const year of years) {
    const yearTotal = byYear[year].reduce((s,b) => s + sumNonNull(b.people.map(p => p.actual)), 0);
    const yearBudget = byYear[year].reduce((s,b) => s + sumNonNull(b.people.map(p => p.budget)), 0);
    html += `
      <details class="collapsible year-group" ${year === years[0] ? 'open' : ''}>
        <summary>
          <span class="summary-title"><em>${escHTML(year)}</em></span>
          <span class="summary-meta">
            <span>${byYear[year].length} occasions</span>
            <span>Spent <strong>${fmt$0(yearTotal)}</strong> of <strong>${fmt$0(yearBudget)}</strong></span>
          </span>
        </summary>
        <div class="body">
    `;
    for (const blk of byYear[year]) {
      const idx = db.gift_blocks.indexOf(blk);
      const totalBudget = sumNonNull(blk.people.map(p => p.budget));
      const totalActual = sumNonNull(blk.people.map(p => p.actual));
      html += `
        <details class="collapsible">
          <summary>
            <span class="summary-title">${escHTML(blk.occasion)} ${noteIcon(`gift_blocks.${idx}`)}</span>
            <span class="summary-meta">
              <span>${blk.people.length} people</span>
              <span>${fmt$0(totalActual)} / ${fmt$0(totalBudget)}</span>
              <button class="btn tiny ghost" onclick="event.stopPropagation();addGiftPerson(${idx})">+</button>
              <button class="btn tiny danger" onclick="event.stopPropagation();deleteGiftOccasion(${idx})">×</button>
            </span>
          </summary>
          <div class="body">
            <div class="table-wrap"><table>
              <thead><tr><th>Person</th><th class="num">Budget</th><th class="num">Actual</th><th>Gift</th><th>Date Bought</th><th></th><th class="actions"></th></tr></thead>
              <tbody>
                ${blk.people.map((p, pi) => `
                  <tr>
                    <td>${inlineText(`gift_blocks.${idx}.people.${pi}.name`, p.name)}</td>
                    <td class="num">${inlineNum(`gift_blocks.${idx}.people.${pi}.budget`, p.budget)}</td>
                    <td class="num" style="${p.actual && p.budget && p.actual > p.budget ? 'color:var(--red);font-weight:600;' : ''}">${inlineNum(`gift_blocks.${idx}.people.${pi}.actual`, p.actual)}</td>
                    <td>${inlineText(`gift_blocks.${idx}.people.${pi}.gift`, p.gift, {placeholder:'What was gifted'})}</td>
                    <td><input type="date" class="editable text" data-path="gift_blocks.${idx}.people.${pi}.date_purchased" data-type="text" value="${escAttr(p.date_purchased || '')}" onblur="commitInline(this)" style="font-family:'JetBrains Mono', monospace; font-size:12px;"></td>
                    <td>${noteIcon(`gift_blocks.${idx}.people.${pi}`)}</td>
                    <td class="actions"><button class="btn tiny danger" onclick="deleteGiftPerson(${idx},${pi})">×</button></td>
                  </tr>
                  ${p.note ? `<tr><td colspan="7"><div class="note-block">${escHTML(p.note)}</div></td></tr>` : ''}
                `).join('')}
                <tr class="total-row">
                  <td>TOTAL</td>
                  <td class="num">${fmt$0(totalBudget)}</td>
                  <td class="num">${fmt$0(totalActual)}</td>
                  <td colspan="4"></td>
                </tr>
              </tbody>
            </table></div>
            <p style="font-size:12px; color:var(--ink-soft); margin-top: 8px; font-style:italic;">
              💡 Add a "Date Bought" to a gift with an actual cost to have it automatically counted in that month's Spending total.
            </p>
          </div>
        </details>
      `;
    }
    html += `</div></details>`;
  }
  html += `
    <div class="panel">
      <h3>Future Gift Ideas <span class="meta"><button class="btn tiny" onclick="addGiftIdea()">+ Add</button></span></h3>
      <div class="table-wrap"><table>
        <thead><tr><th>Person</th><th>Idea</th><th></th><th class="actions"></th></tr></thead>

          ${ideas.map((idea, i) => `
            <tr>
              <td>${inlineText(`gift_ideas.${i}.person`, idea.person)}</td>
              <td>${inlineText(`gift_ideas.${i}.idea`, idea.idea)}</td>
              <td>${noteIcon(`gift_ideas.${i}`)}</td>
              <td class="actions"><button class="btn tiny danger" onclick="deleteFromList('gift_ideas',${i})">×</button></td>
            </tr>
            ${idea.note ? `<tr><td colspan="4"><div class="note-block">${escHTML(idea.note)}</div></td></tr>` : ''}
          `).join('')}
        </tbody>
      </table></div>
    </div>

  return html;

// TIMELINE — editable colors, auto-pulled income/expenses for actual months,
// and per-month extras for one-off income/expenses
// =================================================================
function renderTimeline() {
  ensureTimelineColors();
  const snapshotsByMonth = collectActualNetWorthByMonth();
  const latestActual = getLatestSnapshotMonth();
  const earningsByMonth = collectEarningsByMonth();
  const spendingByMonth = collectSpendingByMonth();

  const beforeRows = computeTimelineRows(db.timeline_before_moving, 'timeline_before_moving',
    snapshotsByMonth, latestActual, null, earningsByMonth, spendingByMonth);
  const carryover = beforeRows.length ? beforeRows[beforeRows.length - 1].cumulative : 0;
  const afterRows = computeTimelineRows(db.timeline_after_moving, 'timeline_after_moving',
    snapshotsByMonth, latestActual, carryover, earningsByMonth, spendingByMonth);

  return `
    <div class="section-head">
      <div>
        <h2>Cash-flow Timeline</h2>
        <div class="desc">Month-by-month roadmap. <strong>Actual</strong> rows pull cumulative net worth from your Monthly Budgeting snapshots, and pull income/expenses from the Earnings &amp; Spending tabs. Additional one-off income/expenses can be added per month. Color tags are editable — you can rename, recolor, or add new categories below.</div>
      </div>

function lightenColor(hex, amount) {
  const c = hexToRgb(hex);
  if (!c) return hex;
  return rgbToHex(
    Math.round(c.r + (255 - c.r) * amount),
    Math.round(c.g + (255 - c.g) * amount),
    Math.round(c.b + (255 - c.b) * amount)
  );
}
function darkenColor(hex, amount) {
  const c = hexToRgb(hex);
  if (!c) return hex;
  return rgbToHex(
    Math.round(c.r * (1 - amount)),
    Math.round(c.g * (1 - amount)),
    Math.round(c.b * (1 - amount))
  );
}
function hexToRgb(hex) {
  const m = /^#?([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})$/i.exec(hex);
  if (!m) return null;
  return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
}
function rgbToHex(r, g, b) {
  const h = (n) => n.toString(16).padStart(2, '0');
  return '#' + h(Math.max(0, Math.min(255, r))) + h(Math.max(0, Math.min(255, g))) + h(Math.max(0, Math.min(255, b)));
}
function hexToRgba(hex, alpha) {
  const c = hexToRgb(hex);
  if (!c) return hex;
  return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
}

function collectActualNetWorthByMonth() {
  const out = {};
  const blocks = (db.budget_blocks || []).slice().sort((a,b) => sortBudgetBlock(a) - sortBudgetBlock(b));
  for (const blk of blocks) {
    const ym = budgetBlockToYearMonth(blk);
    if (!ym) continue;
    const calc = computeBudgetTotals(blk);
    out[ym] = { cumulative: calc.combinedFinal, label: blk.date };
  }
  return out;
}

function budgetBlockToYearMonth(blk) {
  const d = blk.date || '';
  const yMatch = d.match(/(20\d{2})/);
  if (!yMatch) return null;
  const monthMatch = d.match(/(January|February|March|April|May|June|July|August|September|October|November|December|Feburary)/i);
  if (!monthMatch) return null;
  const mn = monthMatch[1];
  let monthIdx;
  if (/feburary|february/i.test(mn)) monthIdx = 1;
  else monthIdx = MONTHS.findIndex(m => m.toLowerCase() === mn.toLowerCase());
  if (monthIdx < 0) return null;
  return `${yMatch[1]}-${String(monthIdx + 1).padStart(2, '0')}`;
}

function getLatestSnapshotMonth() {
  const blocks = (db.budget_blocks || []);
  if (!blocks.length) return null;
  const sorted = blocks.slice().sort((a,b) => sortBudgetBlock(b) - sortBudgetBlock(a));
  const ym = budgetBlockToYearMonth(sorted[0]);
  if (!ym) return null;
  const [y, m] = ym.split('-').map(Number);
  return { year: y, monthIdx: m - 1, ym };
}

function collectEarningsByMonth() {
  const out = {};
  for (const yr of [2025, 2026, 2027]) {
    const weeks = db[`earnings_${yr}_weeks`] || [];
    for (const w of weeks) {
      if (!w.month) continue;
      const monthIdx = MONTHS.indexOf(w.month);
      if (monthIdx < 0) continue;
      const ym = `${yr}-${String(monthIdx + 1).padStart(2, '0')}`;
      out[ym] = (out[ym] || 0) + weekTotal(w);
    }
  }
  return out;
}

function collectSpendingByMonth() {
  const out = {};
  for (const yr of [2025, 2026, 2027]) {
    const weeks = db[`spending_${yr}_weeks`] || [];
    if (!weeks.length) continue;
    for (const w of weeks) {
      if (!w.month) continue;
      const monthIdx = MONTHS.indexOf(w.month);
      if (monthIdx < 0) continue;
      const ym = `${yr}-${String(monthIdx + 1).padStart(2, '0')}`;
      if (!out[ym]) out[ym] = { daily: 0, fixed: 0, gifts: 0 };
      out[ym].daily += weekTotal(w);
    }
    const monthsSeen = new Set();
    for (const w of weeks) if (w.month) monthsSeen.add(w.month);
    for (const month of monthsSeen) {
      const monthIdx = MONTHS.indexOf(month);
      if (monthIdx < 0) continue;
      const ym = `${yr}-${String(monthIdx + 1).padStart(2, '0')}`;
      const fixed = getFixedSpending(yr, month);
      const gifts = getMonthlyGifts(yr, month);
      out[ym].fixed = fixed.total;
      out[ym].gifts = gifts.total;
    }
  }
  return out;
}

function spendingMonthTotal(s) {
  if (!s) return 0;
  return (s.daily || 0) + (s.fixed || 0) + (s.gifts || 0);
}

function computeTimelineRows(t, key, snapshots, latestActual, carryover, earningsByMonth, spendingByMonth) {
  if (!t || !t.months) return [];
  const LILY_FIXED_MONTHLY_INCOME = 3350; // Lily's fixed monthly income — added to earnings auto-pull
  const rows = [];
  let cumulative = (carryover === null || carryover === undefined) ? 0 : carryover;
  let firstRow = (carryover === null || carryover === undefined);
  for (let i = 0; i < t.months.length; i++) {
    const m = t.months[i];
    const ym = m.iso_month;
    const isActual = ym && !!snapshots[ym];

    // For actual months: pull income from Earnings tab + Lily's fixed monthly,
    // and pull expenses from Spending tab. Mortgage is shown separately so the
    // user sees both columns; we add it into the Net total via the mortgageTotal var.
    let incomeAuto = 0, expensesAuto = 0;
    if (isActual) {
      const harutEarnings = (earningsByMonth[ym] !== undefined) ? earningsByMonth[ym] : 0;
      incomeAuto = harutEarnings + LILY_FIXED_MONTHLY_INCOME;
    }
    if (isActual && spendingByMonth[ym]) expensesAuto = spendingMonthTotal(spendingByMonth[ym]);

    const manualIncome = Number(m.income) || 0;
    const manualExpenses = Number(m.expenses) || 0;

    const extraIncome = (m.extra_income || []).reduce((s,x) => s + (Number(x.amount)||0), 0);
    const extraExpenses = (m.extra_expenses || []).reduce((s,x) => s + (Number(x.amount)||0), 0);

    // Income column total (positive)
    const incomeTotal = (isActual ? incomeAuto : manualIncome) + extraIncome;
    // Expenses column total (negative). For actual months, expensesAuto is positive
    // so we negate it. Mortgage is NEGATIVE already (it's stored as a negative value).
    const expensesTotal = (isActual ? -expensesAuto : manualExpenses) - extraExpenses;
    const mortgageTotal = Number(m.mortgage) || 0;

    const netTotal = mortgageTotal + incomeTotal + expensesTotal;

    if (isActual && snapshots[ym]) {
      cumulative = snapshots[ym].cumulative;
      firstRow = false;
    } else {
      if (firstRow) {
        cumulative = netTotal;
        firstRow = false;
      } else {
        cumulative = cumulative + netTotal;
      }
    }

    const colorKey = m.color_override || (isActual ? 'actual' : 'projected');

    rows.push({
      idx: i, key, m,
      mortgageTotal, incomeAuto, manualIncome, extraIncome, incomeTotal,
      expensesAuto, manualExpenses, extraExpenses, expensesTotal,
      netTotal, cumulative,
      ym, isActual, colorKey,
      actualLabel: (isActual && snapshots[ym]) ? snapshots[ym].label : null,
    });
  }
  return rows;
}

      </div>
    </div>
    ${notes.length === 0 ? `<div class="empty panel">No notes yet — click "New Note" to start.</div>` :
      notes.map(n => {
        const realIdx = db.notes.indexOf(n);
        return `
        <div class="note-card">
          <div class="note-head">
            <div class="title">${escHTML(n.title)}</div>
            <div style="display:flex; gap:8px; align-items:center;">
              <span class="date">${escHTML(n.date_created)}</span>
              <button class="btn tiny ghost" onclick="editNote(${realIdx})">Edit</button>
              <button class="btn tiny danger" onclick="deleteNote(${realIdx})">×</button>
            </div>
          </div>
          <div class="note-body">${escHTML(n.body)}</div>
        </div>
      `}).join('')}
  `;
}
function addNote() {
  const html = `
    <div class="field"><label>Title</label><input type="text" id="nt_t" placeholder="What's this about?"></div>
    <div class="field"><label>Body</label><textarea id="nt_b" rows="8" placeholder="Write freely…"></textarea></div>
  `;
  openModal('New note', html, () => {
    const t = document.getElementById('nt_t').value.trim();
    const b = document.getElementById('nt_b').value.trim();
    if (!t && !b) { alert('Title or body required'); return false; }
    db.notes.unshift({
      id: 'nt_' + uid(),
      title: t || '(Untitled)',
      body: b,
      date_created: todayISO(),
    });
    saveDBNow(); render();
  });
}
function editNote(idx) {
  const n = db.notes[idx];
  const html = `
    <div class="field"><label>Title</label><input type="text" id="nt_t" value="${escAttr(n.title)}"></div>
    <div class="field"><label>Body</label><textarea id="nt_b" rows="10">${escHTML(n.body)}</textarea></div>
  `;
  openModal('Edit note', html, () => {
    n.title = document.getElementById('nt_t').value.trim() || '(Untitled)';
    n.body = document.getElementById('nt_b').value.trim();
    saveDBNow(); render();
  });
}
function deleteNote(idx) {
  if (!confirm('Delete this note?')) return;
  db.notes.splice(idx, 1);
  saveDBNow(); render();
}

// =================================================================
// EXPORT / IMPORT / RESET
// =================================================================
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'harlily-ledger-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported');
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!confirm('Replace ALL current data with the imported file?')) return;
      db = parsed;
      // Ensure structure migrations run
      ensureBudgetingMigrated();
      saveDBNow(); render(); toast('Imported');
    } catch (err) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function resetAll() {
  if (!confirm('Reset everything to the original spreadsheet data? Your changes will be lost.')) return;
  if (!confirm('Are you really sure? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadDB(); render(); toast('Reset');
}

// INIT — actual app initialization happens in bootApp() after passcode
